spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://mangacdc:mangacdc@localhost:5432/mangacdc}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: mangacdc-notification
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      sasl.mechanism: ${SPRING_KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${SPRING_KAFKA_SASL_JAAS_CONFIG:}
      security.protocol: ${SPRING_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
  jdbc:
    template:
      fetch-size: 100

discord:
  webhook-url: ${DISCORD_WEBHOOK_URL:}

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:}

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:}

cdc:
  enabled: ${CDC_ENABLED:false}
  topic-pattern: mangacdc.public.chapters
