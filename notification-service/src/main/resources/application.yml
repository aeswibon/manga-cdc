spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mangacdc}
    username: ${SPRING_DATASOURCE_USERNAME:mangacdc}
    password: ${SPRING_DATASOURCE_PASSWORD:mangacdc}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: 30000
      max-lifetime: 1800000
      idle-timeout: 600000
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: mangacdc-notification
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      sasl.mechanism: ${SPRING_KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${SPRING_KAFKA_SASL_JAAS_CONFIG:}
      security.protocol: ${SPRING_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
  jdbc:
    template:
      fetch-size: 100

discord:
  webhook-url: ${DISCORD_WEBHOOK_URL:}

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:}

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:}

cdc:
  enabled: ${CDC_ENABLED:false}
  topic-pattern: mangacdc.public.chapters

pipeline:
  scraper-health-url: ${PIPELINE_SCRAPER_HEALTH_URL:}
  scraper-ready-url: ${PIPELINE_SCRAPER_READY_URL:}

# Write endpoints (POST/PUT/DELETE /api/series, POST /api/logs/{id}/retry) are disabled by default.
# Set ADMIN_MUTATIONS_ENABLED=true to allow mutations; optionally set ADMIN_API_KEY to require X-Admin-Key.

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: notification-service
