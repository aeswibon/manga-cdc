spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mangacdc
    username: mangacdc
    password: mangacdc
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      sasl.mechanism: ${SPRING_KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${SPRING_KAFKA_SASL_JAAS_CONFIG:}
      security.protocol: ${SPRING_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
  jdbc:
    template:
      fetch-size: 100

discord:
  webhook-url: ${DISCORD_WEBHOOK_URL:}

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:}

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:}

cdc:
  enabled: ${CDC_ENABLED:false}
  topic-pattern: mangacdc.public.chapters

poller:
  interval-ms: 30000
