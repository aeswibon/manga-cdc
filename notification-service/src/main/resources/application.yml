spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mangacdc}
    username: ${SPRING_DATASOURCE_USERNAME:mangacdc}
    password: ${SPRING_DATASOURCE_PASSWORD:mangacdc}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:5}
      minimum-idle: ${DB_MIN_IDLE:1}
      connection-timeout: 30000
      max-lifetime: 1800000
      idle-timeout: 600000
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: mangacdc-notification
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      sasl.mechanism: ${SPRING_KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${SPRING_KAFKA_SASL_JAAS_CONFIG:}
      security.protocol: ${SPRING_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
  jdbc:
    template:
      fetch-size: 100

discord:
  webhook-url: ${DISCORD_WEBHOOK_URL:}
  bot-token: ${DISCORD_BOT_TOKEN:}

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:}

telegram:
  bot-username: ${TELEGRAM_BOT_USERNAME:}
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:}

cdc:
  enabled: ${CDC_ENABLED:false}
  topic-pattern: mangacdc.public.chapters

pipeline:
  scraper-health-url: ${PIPELINE_SCRAPER_HEALTH_URL:}
  scraper-ready-url: ${PIPELINE_SCRAPER_READY_URL:}

# Write endpoints (POST/PUT/DELETE /api/series, POST /api/logs/{id}/retry) are disabled by default.
# Set ADMIN_MUTATIONS_ENABLED=true and ADMIN_API_KEY to allow authenticated admin mutations.

security:
  require-api-key: ${SECURITY_REQUIRE_API_KEY:false}
  require-webhook-auth: ${SECURITY_REQUIRE_WEBHOOK_AUTH:true}
  read-rate-limit-per-minute: ${SECURITY_READ_RATE_LIMIT:120}
  webhook-rate-limit-per-minute: ${SECURITY_WEBHOOK_RATE_LIMIT:30}
  max-sse-connections-per-ip: ${SECURITY_MAX_SSE_PER_IP:5}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: notification-service

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:WARN}
    com.mangacdc: ${LOGGING_LEVEL_APP:WARN}
