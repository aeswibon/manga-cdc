name: Sync version from tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-version-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-version:
    name: Align version files on master
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        if: env.ACT != 'true'
        with:
          fetch-depth: 0
          ref: master

      - name: Resolve tag version
        id: tag
        run: |
          ref="${GITHUB_REF}"
          if ! [[ "$ref" =~ ^refs/tags/v(.+)$ ]]; then
            echo "Expected refs/tags/vX.Y.Z, got $ref"
            exit 1
          fi
          version="${BASH_REMATCH[1]}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver tag: v${version}"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Tag version: $version"

      - name: Sync version files
        run: bash scripts/ci/sync-versions-from-tag.sh "${{ steps.tag.outputs.version }}"

      - name: Verify sync (act)
        if: env.ACT == 'true'
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          grep -q "\"version\": \"${VERSION}\"" dashboard/package.json
          grep -q "\"version\": \"${VERSION}\"" status-page/package.json
          grep -q "const Version = \"${VERSION}\"" scraper/internal/version/version.go
          grep -q "version: ${VERSION}" helm/manga-cdc/Chart.yaml
          grep -q "appVersion: \"${VERSION}\"" helm/manga-cdc/Chart.yaml
          grep -q "<version>${VERSION}</version>" notification-service/pom.xml
          grep -q "ARG APP_VERSION=${VERSION}" scraper/Dockerfile notification-service/Dockerfile
          echo "act: verified version files at ${VERSION}"

      - name: Detect release state
        if: env.ACT != 'true'
        id: state
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          git fetch origin master "refs/tags/v${VERSION}"
          master_sha=$(git rev-parse origin/master)
          tag_sha=$(git rev-parse "refs/tags/v${VERSION}^{commit}" 2>/dev/null || echo "")
          if [ -z "$(git status --porcelain)" ] && [ -n "$tag_sha" ] && [ "$tag_sha" = "$master_sha" ]; then
            echo "Release already aligned: tag v${VERSION} at master with synced files."
            echo "skip_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure GPG signing for bot commits
        if: env.ACT != 'true' && steps.state.outputs.skip_publish != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gpg --batch --passphrase '' --quick-generate-key \
            "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>" \
            default default never
          signing_key="$(gpg --list-secret-keys --with-colons | awk -F: '$1 == "sec" { print $5; exit }')"
          git config user.signingkey "${signing_key}"
          git config commit.gpgsign true

      - name: Commit, retag, and push to master
        if: env.ACT != 'true' && steps.state.outputs.skip_publish != 'true'
        id: publish
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          pushed_master=false
          if ! git diff --quiet; then
            git add \
              dashboard/package.json \
              status-page/package.json \
              helm/manga-cdc/Chart.yaml \
              scraper/internal/version/version.go \
              notification-service/pom.xml \
              scraper/Dockerfile \
              notification-service/Dockerfile

            git commit -m "chore: sync version files to v${VERSION}"
            git push origin master
            pushed_master=true
          else
            echo "Version files already aligned with v${VERSION}"
          fi

          tag_before=$(git rev-parse "refs/tags/v${VERSION}^{commit}" 2>/dev/null || echo "")
          head_sha=$(git rev-parse HEAD)
          git tag -f "v${VERSION}"
          git push -f origin "v${VERSION}"

          tag_moved=false
          if [ "$tag_before" != "$head_sha" ]; then
            tag_moved=true
          fi
          echo "pushed_master=${pushed_master}" >> "$GITHUB_OUTPUT"
          echo "tag_moved=${tag_moved}" >> "$GITHUB_OUTPUT"

      - name: Trigger release Test and Build
        if: env.ACT != 'true' && steps.state.outputs.skip_publish != 'true' && steps.publish.outputs.pushed_master == 'false' && steps.publish.outputs.tag_moved == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run test-and-build.yml --ref master
          echo "Dispatched Test and Build on master (retag without version commit)."
