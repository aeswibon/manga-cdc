name: Sync version from tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: write
  packages: read

concurrency:
  group: sync-version-${{ github.ref }}
  cancel-in-progress: false

env:
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service
  DASHBOARD_IMAGE: ghcr.io/aeswibon/manga-cdc/dashboard

jobs:
  sync-version:
    name: Align version files on master
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Require release bot token
        if: env.ACT != 'true'
        env:
          RELEASE_BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        run: |
          if [ -z "$RELEASE_BOT_TOKEN" ]; then
            echo "error: RELEASE_BOT_TOKEN secret is required to push verified commits to protected master." >&2
            echo "Create a fine-grained PAT (contents read/write), add its user to the master ruleset bypass list," >&2
            echo "store it as RELEASE_BOT_TOKEN, then re-run this workflow." >&2
            echo "See .github/act/README.md#release-bot-setup" >&2
            exit 1
          fi

      - uses: actions/checkout@v6
        if: env.ACT != 'true'
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.RELEASE_BOT_TOKEN }}

      - name: Resolve tag version
        id: tag
        run: |
          ref="${GITHUB_REF}"
          if ! [[ "$ref" =~ ^refs/tags/v(.+)$ ]]; then
            echo "Expected refs/tags/vX.Y.Z, got $ref"
            exit 1
          fi
          version="${BASH_REMATCH[1]}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver tag: v${version}"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Tag version: $version"

      - name: Sync version files
        run: bash scripts/ci/sync-versions-from-tag.sh "${{ steps.tag.outputs.version }}"

      - name: Verify sync (act)
        if: env.ACT == 'true'
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          grep -q "\"version\": \"${VERSION}\"" dashboard/package.json
          grep -q "\"version\": \"${VERSION}\"" status-page/package.json
          grep -q "const Version = \"${VERSION}\"" scraper/internal/version/version.go
          grep -q "version: ${VERSION}" helm/manga-cdc/Chart.yaml
          grep -q "appVersion: \"${VERSION}\"" helm/manga-cdc/Chart.yaml
          grep -q "<version>${VERSION}</version>" notification-service/pom.xml
          grep -q "ARG APP_VERSION=${VERSION}" scraper/Dockerfile notification-service/Dockerfile dashboard/Dockerfile
          echo "act: verified version files at ${VERSION}"

      - name: Detect git release state
        if: env.ACT != 'true'
        id: git_state
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          git fetch origin master "refs/tags/v${VERSION}"
          master_sha=$(git rev-parse origin/master)
          tag_sha=$(git rev-parse "refs/tags/v${VERSION}^{commit}" 2>/dev/null || echo "")
          if [ -z "$(git status --porcelain)" ] && [ -n "$tag_sha" ] && [ "$tag_sha" = "$master_sha" ]; then
            echo "Git release aligned: tag v${VERSION} at master with synced files."
            echo "skip_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "Git release needs publish (version commit and/or retag)."
            echo "skip_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v4
        if: env.ACT != 'true'

      - uses: docker/login-action@v4
        if: env.ACT != 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check GHCR release images
        if: env.ACT != 'true'
        id: images
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set +e
          bash scripts/ci/check-ghcr-release-images.sh "${VERSION}"
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "release_images_exist=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_images_exist=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide sync skip
        if: env.ACT != 'true'
        id: state
        run: |
          skip_publish="${{ steps.git_state.outputs.skip_publish }}"
          images_exist="${{ steps.images.outputs.release_images_exist }}"
          if [ "$skip_publish" = "true" ] && [ "$images_exist" = "true" ]; then
            echo "Release complete: git aligned and ghcr.io images published."
            echo "skip_all=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release incomplete or needs rebuild."
            echo "skip_all=false" >> "$GITHUB_OUTPUT"
          fi
          echo "skip_publish=${skip_publish}" >> "$GITHUB_OUTPUT"
          echo "release_images_exist=${images_exist}" >> "$GITHUB_OUTPUT"

      - name: Publish version sync to master
        if: env.ACT != 'true' && steps.state.outputs.skip_all != 'true' && steps.state.outputs.skip_publish != 'true'
        id: publish
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          RELEASE_BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci/publish-version-sync.sh "${VERSION}"

      - name: Trigger release Test and Build
        if: >-
          env.ACT != 'true' &&
          steps.state.outputs.skip_all != 'true' &&
          steps.state.outputs.release_images_exist != 'true' &&
          (
            steps.state.outputs.skip_publish == 'true' ||
            (steps.publish.outputs.pushed_master == 'false' && steps.publish.outputs.tag_moved == 'true')
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run test-and-build.yml --ref master
          echo "Dispatched Test and Build on master (ghcr.io release images missing)."
