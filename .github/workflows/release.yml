name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  packages: read

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
      reason: ${{ steps.gate.outputs.reason }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether to run release pipeline
        id: gate
        env:
          GITHUB_EVENT_CREATED: ${{ github.event.created }}
        run: bash scripts/ci/release-gate.sh

  run-pipeline:
    name: Run release pipeline
    needs: release-gate
    if: needs.release-gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
      actions: write
      packages: read
    steps:
      - uses: actions/checkout@v6
      - uses: aeswibon/pipeline-compose-run@v0.3.0
        with:
          pipeline_file: .github/pipelines/release.yml
          github_token: ${{ github.token }}

  skip-release:
    name: Skip release pipeline
    needs: release-gate
    if: needs.release-gate.outputs.proceed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: |
          echo "Release pipeline skipped (${{ needs.release-gate.outputs.reason }})."

  complete:
    name: Release complete
    needs: [release-gate, run-pipeline, skip-release]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify release result
        run: |
          if [ "${{ needs.release-gate.outputs.proceed }}" != "true" ]; then
            echo "Release skipped by gate (${{ needs.release-gate.outputs.reason }})."
            exit 0
          fi
          if [ "${{ needs.run-pipeline.result }}" = "success" ]; then
            exit 0
          fi
          echo "Release pipeline failed."
          exit 1
