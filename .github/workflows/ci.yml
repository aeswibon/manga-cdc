name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service

jobs:
  scraper:
    name: Go scraper
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: scraper/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -v -count=1

  notification-service:
    name: Java notification service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - run: mvn verify -B

  docker:
    name: Build and push Docker images
    needs: [scraper, notification-service]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tags
        id: tags
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "scraper_tags=${{ env.SCRAPER_IMAGE }}:pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
            echo "notification_tags=${{ env.NOTIFICATION_IMAGE }}:pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          else
            echo "scraper_tags=${{ env.SCRAPER_IMAGE }}:${SHORT_SHA},${{ env.SCRAPER_IMAGE }}:latest" >> $GITHUB_OUTPUT
            echo "notification_tags=${{ env.NOTIFICATION_IMAGE }}:${SHORT_SHA},${{ env.NOTIFICATION_IMAGE }}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push scraper
        uses: docker/build-push-action@v6
        with:
          context: scraper
          push: true
          tags: ${{ steps.tags.outputs.scraper_tags }}

      - name: Build and push notification-service
        uses: docker/build-push-action@v6
        with:
          context: notification-service
          push: true
          tags: ${{ steps.tags.outputs.notification_tags }}
