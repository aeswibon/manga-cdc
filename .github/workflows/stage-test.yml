name: Test

on:
  workflow_dispatch:
    inputs:
      phase:
        description: "unit = lint/tests; e2e = end-to-end (requires image inputs)"
        required: true
        type: choice
        default: unit
        options:
          - unit
          - e2e
      scraper_image:
        description: "Scraper image for e2e"
        required: false
        type: string
      notification_image:
        description: "Notification service image for e2e"
        required: false
        type: string
      dashboard_image:
        description: "Dashboard image for e2e"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  VITE_STATUS_PAGE_URL: ${{ vars.VITE_STATUS_PAGE_URL || 'http://localhost:3001' }}

concurrency:
  group: stage-test-${{ github.event.inputs.phase }}-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  watchlist-validate:
    name: Validate watchlist
    if: inputs.phase == 'unit'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/validate-watchlist.py

  dashboard-test:
    name: Dashboard tests
    if: inputs.phase == 'unit'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard
    env:
      VITE_STATUS_PAGE_URL: ${{ vars.VITE_STATUS_PAGE_URL || 'http://localhost:3001' }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run check
      - run: bun test
      - name: Production build
        run: bun run build
      - name: Verify build output
        run: test -f dist/index.html

  status-page-check:
    name: Status page checks
    if: inputs.phase == 'unit'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: status-page
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck
      - name: Verify static assets
        run: |
          test -f public/index.html
          test -f public/logo.svg
          test -f api/status.ts
          node -e "JSON.parse(require('fs').readFileSync('vercel.json','utf8'))"

  go-test:
    name: Go tests
    if: inputs.phase == 'unit'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: scraper/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      - name: Adapter parser tests
        run: go test ./internal/adapter/... -count=1 -v
      - run: go test ./... -v -count=1

  go-integration-test:
    name: Go integration tests
    if: inputs.phase == 'unit'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: scraper
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: mangacdc
          POSTGRES_USER: mangacdc
          POSTGRES_PASSWORD: mangacdc
          PGUSER: mangacdc
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: scraper/go.sum
      - run: go mod download
      - name: Integration tests
        run: go test -tags=integration -p 1 ./internal/... -v -count=1
        env:
          DATABASE_URL_TEST: postgres://mangacdc:mangacdc@localhost:5432/mangacdc?sslmode=disable

  configure-test:
    name: Configure tests
    if: inputs.phase == 'unit'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: configure
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: configure/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go test ./... -v -count=1

  java-test:
    name: Java tests
    if: inputs.phase == 'unit'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - run: mvn verify -B -Pintegration-tests

  e2e-test:
    name: End-to-end tests
    if: inputs.phase == 'e2e'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SCRAPER_IMAGE: ${{ inputs.scraper_image }}
      NOTIFICATION_IMAGE: ${{ inputs.notification_image }}
      DASHBOARD_IMAGE: ${{ inputs.dashboard_image }}
    steps:
      - uses: actions/checkout@v6
      - name: Require image inputs
        run: |
          for var in SCRAPER_IMAGE NOTIFICATION_IMAGE DASHBOARD_IMAGE; do
            if [ -z "${!var}" ]; then
              echo "Missing $var for e2e phase" >&2
              exit 1
            fi
          done
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: ./scripts/e2e.sh

  export-outputs-unit:
    name: Export pipeline outputs (unit)
    if: inputs.phase == 'unit'
    needs:
      - watchlist-validate
      - dashboard-test
      - status-page-check
      - go-test
      - go-integration-test
      - configure-test
      - java-test
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Export outputs for pipeline-compose
        run: |
          mkdir -p pipeline-compose
          jq -n --arg phase "unit" '{phase: $phase, ok: "true"}' > pipeline-compose/outputs.json

      - uses: actions/upload-artifact@v6
        with:
          name: pipeline-compose-test
          path: pipeline-compose/outputs.json
          retention-days: 1

  export-outputs-e2e:
    name: Export pipeline outputs (e2e)
    if: inputs.phase == 'e2e'
    needs:
      - e2e-test
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Export outputs for pipeline-compose
        run: |
          mkdir -p pipeline-compose
          jq -n --arg phase "e2e" '{phase: $phase, ok: "true"}' > pipeline-compose/outputs.json

      - uses: actions/upload-artifact@v6
        with:
          name: pipeline-compose-test-e2e
          path: pipeline-compose/outputs.json
          retention-days: 1
