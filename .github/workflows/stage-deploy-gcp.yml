name: Deploy GCP

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Semver image tag (e.g. 0.4.5)"
        required: true
        type: string
      deployment_target:
        description: "Deployment target (vm, kubernetes, serverless)"
        required: true
        default: serverless
        type: choice
        options:
          - vm
          - kubernetes
          - serverless
      deploy_method:
        description: "Deployment method (direct, terraform)"
        required: true
        default: terraform
        type: choice
        options:
          - direct
          - terraform

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service
  DASHBOARD_IMAGE: ghcr.io/aeswibon/manga-cdc/dashboard

concurrency:
  group: stage-deploy-gcp-${{ github.event.inputs.image_tag }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy GCP
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
      DEPLOYMENT_TARGET: ${{ inputs.deployment_target }}
      DEPLOY_METHOD: ${{ inputs.deploy_method }}
      GCP_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Deploy summary
        run: |
          echo "GCP deploy — target=${DEPLOYMENT_TARGET} method=${DEPLOY_METHOD} image=${IMAGE_TAG}"

      - name: Validate image tag
        run: |
          if ! echo "${IMAGE_TAG}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "image_tag must be semver (e.g. 0.4.5), not '${IMAGE_TAG}'." >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure GKE kubeconfig
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'kubernetes'
        run: gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_NAME }} --zone ${{ secrets.GCP_ZONE || 'us-central1-a' }}

      - name: Parse DATABASE_URL for JDBC
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'kubernetes'
        id: db_parser
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bash ./scripts/ci/parse-database-url.sh

      - name: Deploy to Kubernetes via Helm
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'kubernetes'
        env:
          SCRAPER_IMAGE: ${{ env.SCRAPER_IMAGE }}
          NOTIFICATION_IMAGE: ${{ env.NOTIFICATION_IMAGE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JDBC_URL: ${{ steps.db_parser.outputs.jdbc_url }}
          DB_USER: ${{ steps.db_parser.outputs.db_user }}
          DB_PASS: ${{ steps.db_parser.outputs.db_pass }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          API_READ_KEY: ${{ secrets.API_READ_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: bash ./scripts/ci/helm-deploy.sh

      - name: Deploy to Cloud Run
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'serverless'
        run: |
          gcloud run services update manga-cdc-notifier-prod \
            --image=${{ env.NOTIFICATION_IMAGE }}:${{ env.IMAGE_TAG }} \
            --region=${{ env.GCP_REGION }} \
            --memory=256Mi \
            --cpu=1 \
            --cpu-throttling \
            --no-cpu-boost \
            --concurrency=80 \
            --min-instances=0 \
            --max-instances=2 \
            --update-env-vars=CDC_ENABLED=false,DB_MAX_POOL_SIZE=3,DB_MIN_IDLE=0,SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
          gcloud run jobs update manga-cdc-scraper-job-prod \
            --image=${{ env.SCRAPER_IMAGE }}:${{ env.IMAGE_TAG }} \
            --region=${{ env.GCP_REGION }} \
            --memory=512Mi \
            --cpu=1 \
            --update-env-vars=WATCHLIST_URL=https://raw.githubusercontent.com/aeswibon/manga-cdc/master/data/watchlist.yaml

      - uses: docker/setup-buildx-action@v4
        if: env.DEPLOY_METHOD == 'terraform'

      - uses: docker/login-action@v4
        if: env.DEPLOY_METHOD == 'terraform'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release images (build publishes GHCR + Docker Hub)
        if: env.DEPLOY_METHOD == 'terraform'
        run: bash scripts/ci/check-ghcr-release-images.sh "${IMAGE_TAG}"

      - name: Use Docker Hub images for Terraform
        if: env.DEPLOY_METHOD == 'terraform'
        run: |
          echo "SCRAPER_IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/scraper" >> "$GITHUB_ENV"
          echo "NOTIFICATION_IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/notification-service" >> "$GITHUB_ENV"

      - name: Setup Terraform
        if: env.DEPLOY_METHOD == 'terraform'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.6"

      - name: Terraform apply
        if: env.DEPLOY_METHOD == 'terraform'
        env:
          DEPLOYMENT_TARGET: ${{ env.DEPLOYMENT_TARGET }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ env.GCP_REGION }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRAFANA_CLOUD_PROMETHEUS_URL: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USER: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          GRAFANA_CLOUD_API_KEY: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          GRAFANA_CLOUD_STACK_URL: ${{ secrets.GRAFANA_CLOUD_STACK_URL }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          QSTASH_DESTINATION_URL: ${{ secrets.QSTASH_DESTINATION_URL }}
          API_READ_KEY: ${{ secrets.API_READ_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
          WATCHLIST_URL: ${{ vars.WATCHLIST_URL }}
        run: bash ./scripts/ci/terraform-apply.sh gcp
