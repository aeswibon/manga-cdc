name: GCloud Deploy

on:
  workflow_run:
    workflows: [Test and Build]
    types: [completed]
    branches: [master]

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service

jobs:
  gcloud-deploy:
    name: Deploy to GCP VM
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - id: tag
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/647451638700/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-cd@project-7e7a48a5-81ef-4c4e-97f.iam.gserviceaccount.com

      - id: deploy
        uses: google-github-actions/ssh-compute@v2
        with:
          instance_name: ${{ secrets.GCP_VM_NAME }}
          zone: ${{ secrets.GCP_ZONE }}
          user: github-actions-cd
          ssh_private_key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          command: |
            set -e
            mkdir -p manga-cdc
            cd manga-cdc
            if [ ! -d .git ]; then
              git clone https://github.com/aeswibon/manga-cdc.git .
            fi
            SPRING_DATASOURCE_URL=$(echo "${{ secrets.DATABASE_URL }}" | sed 's/^postgres:/jdbc:postgresql:/')
            cat > .env << ENVEOF
            SCRAPER_IMAGE=${{ env.SCRAPER_IMAGE }}:${{ steps.tag.outputs.sha_short }}
            NOTIFICATION_IMAGE=${{ env.NOTIFICATION_IMAGE }}:${{ steps.tag.outputs.sha_short }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            SPRING_DATASOURCE_URL=$SPRING_DATASOURCE_URL
            KAFKA_BROKERS=${{ secrets.KAFKA_BROKERS }}
            KAFKA_TOPIC=mangacdc.public.chapters
            KAFKA_USERNAME=${{ secrets.KAFKA_USERNAME }}
            KAFKA_PASSWORD=${{ secrets.KAFKA_PASSWORD }}
            DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
            SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            CDC_ENABLED=true
            ENVEOF
            git fetch origin master
            git reset --hard origin/master
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo 'Deployment complete'

      - name: Verify
        uses: google-github-actions/ssh-compute@v2
        with:
          instance_name: ${{ secrets.GCP_VM_NAME }}
          zone: ${{ secrets.GCP_ZONE }}
          user: github-actions-cd
          ssh_private_key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          command: |
            cd manga-cdc
            echo '=== Container Status ==='
            docker compose -f docker-compose.prod.yml ps
            echo '=== All services running ==='
