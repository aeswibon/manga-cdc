name: GCloud Deploy

on:
  workflow_run:
    workflows: [Test and Build]
    types: [completed]

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service

jobs:
  resolve-release:
    name: Resolve release tag
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && (github.event.workflow_run.head_branch == '' || startsWith(github.event.workflow_run.head_branch, 'v')) }}
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.tag.outputs.should_deploy }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Require version tag on commit
        id: tag
        run: |
          head_branch='${{ github.event.workflow_run.head_branch }}'
          if [ -n "$head_branch" ] && [[ "$head_branch" != v* ]]; then
            echo "Workflow triggered by branch push ($head_branch); skipping deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --tags origin
          release_tag="$(git tag --points-at HEAD | grep -E '^v[0-9]' | sort -V | tail -1 || true)"
          if [ -z "$release_tag" ]; then
            echo "No release tag on ${{ github.event.workflow_run.head_sha }}; skipping deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Release tag: $release_tag"
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "image_tag=${release_tag#v}" >> "$GITHUB_OUTPUT"

  gcloud-deploy:
    name: Deploy to GCP VM
    needs: resolve-release
    if: ${{ needs.resolve-release.outputs.should_deploy == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - id: deploy
        uses: google-github-actions/ssh-compute@v2
        with:
          instance_name: ${{ secrets.GCP_VM_NAME }}
          zone: ${{ secrets.GCP_ZONE }}
          user: ${{ secrets.GCP_SSH_USER }}
          ssh_private_key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          command: |
            set -e
            mkdir -p manga-cdc
            cd manga-cdc
            if [ ! -d .git ]; then
              git clone https://github.com/aeswibon/manga-cdc.git .
            fi
            git fetch origin --force --tags
            git reset --hard ${{ github.event.workflow_run.head_sha }}
            chmod +x scripts/render-prod-env.sh scripts/apply-db-migrations.sh
            export SCRAPER_IMAGE=${{ env.SCRAPER_IMAGE }}:${{ needs.resolve-release.outputs.image_tag }}
            export NOTIFICATION_IMAGE=${{ env.NOTIFICATION_IMAGE }}:${{ needs.resolve-release.outputs.image_tag }}
            export DATABASE_URL='${{ secrets.DATABASE_URL }}'
            export KAFKA_BROKERS='${{ secrets.KAFKA_BROKERS }}'
            export KAFKA_TOPIC=mangacdc.public.chapters
            export KAFKA_USERNAME='${{ secrets.KAFKA_USERNAME }}'
            export KAFKA_PASSWORD='${{ secrets.KAFKA_PASSWORD }}'
            export DISCORD_WEBHOOK_URL='${{ secrets.DISCORD_WEBHOOK_URL }}'
            export SLACK_WEBHOOK_URL='${{ secrets.SLACK_WEBHOOK_URL }}'
            export TELEGRAM_BOT_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN }}'
            export TELEGRAM_CHAT_ID='${{ secrets.TELEGRAM_CHAT_ID }}'
            export CDC_ENABLED=true
            ./scripts/apply-db-migrations.sh
            ./scripts/render-prod-env.sh > .env
            docker compose --env-file .env -f docker-compose.prod.yml pull
            docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans
            echo "Deployed release ${{ needs.resolve-release.outputs.release_tag }}"

      - name: Verify
        uses: google-github-actions/ssh-compute@v2
        with:
          instance_name: ${{ secrets.GCP_VM_NAME }}
          zone: ${{ secrets.GCP_ZONE }}
          user: ${{ secrets.GCP_SSH_USER }}
          ssh_private_key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          command: |
            cd manga-cdc
            echo '=== Container Status ==='
            docker compose --env-file .env -f docker-compose.prod.yml ps
            echo '=== Image tags ==='
            grep -E '^(SCRAPER_IMAGE|NOTIFICATION_IMAGE)=' .env
            echo '=== Scraper metrics ==='
            curl -sf http://127.0.0.1:2112/metrics | grep -E '^scraper_chapters_' || echo 'scraper metrics unavailable'
