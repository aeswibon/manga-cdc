name: GCloud Deploy

on:
  workflow_run:
    workflows: [Test and Build]
    types: [completed]

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service

jobs:
  gcloud-deploy:
    name: Deploy to GCP VM
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve image tag
        id: image-tag
        run: |
          git fetch --tags origin
          release_tag="$(git tag --points-at HEAD | grep -E '^v[0-9]' | sort -V | tail -1 || true)"
          if [ -n "$release_tag" ]; then
            echo "tag=${release_tag#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/647451638700/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-cd@project-7e7a48a5-81ef-4c4e-97f.iam.gserviceaccount.com

      - id: deploy
        uses: google-github-actions/ssh-compute@v2
        with:
          instance_name: ${{ secrets.GCP_VM_NAME }}
          zone: ${{ secrets.GCP_ZONE }}
          user: github-actions-cd
          ssh_private_key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          command: |
            set -e
            mkdir -p manga-cdc
            cd manga-cdc
            if [ ! -d .git ]; then
              git clone https://github.com/aeswibon/manga-cdc.git .
            fi
            git fetch origin master --tags
            git reset --hard origin/master
            chmod +x scripts/render-prod-env.sh
            export SCRAPER_IMAGE=${{ env.SCRAPER_IMAGE }}:${{ steps.image-tag.outputs.tag }}
            export NOTIFICATION_IMAGE=${{ env.NOTIFICATION_IMAGE }}:${{ steps.image-tag.outputs.tag }}
            export DATABASE_URL='${{ secrets.DATABASE_URL }}'
            export KAFKA_BROKERS='${{ secrets.KAFKA_BROKERS }}'
            export KAFKA_TOPIC=mangacdc.public.chapters
            export KAFKA_USERNAME='${{ secrets.KAFKA_USERNAME }}'
            export KAFKA_PASSWORD='${{ secrets.KAFKA_PASSWORD }}'
            export DISCORD_WEBHOOK_URL='${{ secrets.DISCORD_WEBHOOK_URL }}'
            export SLACK_WEBHOOK_URL='${{ secrets.SLACK_WEBHOOK_URL }}'
            export TELEGRAM_BOT_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN }}'
            export TELEGRAM_CHAT_ID='${{ secrets.TELEGRAM_CHAT_ID }}'
            export CDC_ENABLED=true
            ./scripts/render-prod-env.sh > .env
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "Deployed images tagged ${{ steps.image-tag.outputs.tag }}"

      - name: Verify
        uses: google-github-actions/ssh-compute@v2
        with:
          instance_name: ${{ secrets.GCP_VM_NAME }}
          zone: ${{ secrets.GCP_ZONE }}
          user: github-actions-cd
          ssh_private_key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          command: |
            cd manga-cdc
            echo '=== Container Status ==='
            docker compose -f docker-compose.prod.yml ps
            echo '=== Image tags ==='
            grep -E '^(SCRAPER_IMAGE|NOTIFICATION_IMAGE)=' .env
            echo '=== Scraper metrics ==='
            curl -sf http://127.0.0.1:2112/metrics | grep -E '^scraper_chapters_' || echo 'scraper metrics unavailable'
