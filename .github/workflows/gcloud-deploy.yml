name: GCloud Deploy

on:
  workflow_run:
    workflows: [Test and Build]
    types: [completed]

concurrency:
  group: gcloud-deploy-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service

jobs:
  resolve-release:
    name: Resolve release tag
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_deploy: ${{ steps.tag.outputs.should_deploy }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Require version tag on commit
        id: tag
        run: |
          head_branch='${{ github.event.workflow_run.head_branch }}'
          if [ "$head_branch" = "master" ]; then
            echo "Master push workflow (tests only); deploy runs on tag release workflows."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --tags origin
          release_tag="$(git tag --points-at HEAD | grep -E '^v[0-9]' | sort -V | tail -1 || true)"
          if [ -z "$release_tag" ]; then
            echo "No release tag on ${{ github.event.workflow_run.head_sha }}; skipping deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Release tag: $release_tag"
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "image_tag=${release_tag#v}" >> "$GITHUB_OUTPUT"

  gcloud-deploy:
    name: Deploy to GCP VM
    needs: resolve-release
    if: ${{ needs.resolve-release.outputs.should_deploy == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
      IMAGE_TAG: ${{ needs.resolve-release.outputs.image_tag }}
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
      GCP_SSH_USER: ${{ secrets.GCP_SSH_USER }}
      GCP_VM_NAME: ${{ secrets.GCP_VM_NAME }}
      GCP_ZONE: ${{ secrets.GCP_ZONE }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Deploy summary
        run: |
          echo "Deploying ${RELEASE_TAG} (${IMAGE_TAG}) to GCP VM"
          echo "Commit: ${DEPLOY_SHA}"

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Prepare SSH key
        env:
          GCP_SSH_PRIVATE_KEY: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
        run: |
          chmod +x scripts/ci-prepare-gcp-ssh-key.sh
          ./scripts/ci-prepare-gcp-ssh-key.sh

      - name: Render production .env
        env:
          SCRAPER_IMAGE: ${{ env.SCRAPER_IMAGE }}:${{ env.IMAGE_TAG }}
          NOTIFICATION_IMAGE: ${{ env.NOTIFICATION_IMAGE }}:${{ env.IMAGE_TAG }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_TOPIC: mangacdc.public.chapters
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CDC_ENABLED: "true"
          OBSERVABILITY_MODE: grafana-cloud
          GRAFANA_CLOUD_PROMETHEUS_URL: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USER: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          GRAFANA_CLOUD_API_KEY: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          GRAFANA_CLOUD_STACK_URL: ${{ secrets.GRAFANA_CLOUD_STACK_URL }}
          GRAFANA_CLOUD_PROMETHEUS_DATASOURCE_UID: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_DATASOURCE_UID }}
        run: |
          chmod +x scripts/render-prod-env.sh
          ./scripts/render-prod-env.sh > "$RUNNER_TEMP/prod.env"
          chmod 600 "$RUNNER_TEMP/prod.env"

      - name: Sync repo on VM
        run: |
          chmod +x scripts/ci-gcloud-ssh.sh
          timeout 180 ./scripts/ci-gcloud-ssh.sh "set -euo pipefail; mkdir -p ~/manga-cdc; cd ~/manga-cdc; if [ ! -d .git ]; then git clone https://github.com/aeswibon/manga-cdc.git .; fi; git fetch origin --force --tags; git reset --hard '${{ env.DEPLOY_SHA }}'; chmod +x scripts/deploy-prod-on-vm.sh scripts/verify-prod-on-vm.sh"

      - name: Copy .env to VM
        run: |
          chmod +x scripts/ci-gcloud-scp.sh
          timeout 120 ./scripts/ci-gcloud-scp.sh "$RUNNER_TEMP/prod.env" "~/manga-cdc/.env"

      - name: Deploy on VM
        run: |
          timeout 1200 ./scripts/ci-gcloud-ssh.sh "bash ~/manga-cdc/scripts/deploy-prod-on-vm.sh"

      - name: Verify production
        run: |
          timeout 180 ./scripts/ci-gcloud-ssh.sh "OBSERVABILITY_REQUIRED=true bash ~/manga-cdc/scripts/verify-prod-on-vm.sh"

      - name: Observability URLs
        run: |
          if [ -n "${{ secrets.GRAFANA_CLOUD_STACK_URL }}" ]; then
            echo "Grafana Cloud dashboard: ${{ secrets.GRAFANA_CLOUD_STACK_URL }}/d/manga-cdc-overview/manga-cdc"
          else
            echo "Set GRAFANA_CLOUD_STACK_URL secret for dashboard link output"
          fi
          echo "Metrics path: Alloy on VM -> Grafana Cloud Prometheus (remote_write)"
