name: GCloud Deploy

on:
  workflow_run:
    workflows: [Test and Build]
    types: [completed]
    branches: [master]

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service
  GCP_USER: github-actions-cd
  GCP_APP_DIR: manga-cdc

jobs:
  gcloud-deploy:
    name: Deploy to GCP VM
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - id: tag
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/647451638700/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-cd@project-7e7a48a5-81ef-4c4e-97f.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Write .env file
        run: |
          cat > /tmp/manga-cdc-env << EOF
SCRAPER_IMAGE=${{ env.SCRAPER_IMAGE }}:${{ steps.tag.outputs.sha_short }}
NOTIFICATION_IMAGE=${{ env.NOTIFICATION_IMAGE }}:${{ steps.tag.outputs.sha_short }}
DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
QSTASH_TOKEN=${{ secrets.QSTASH_TOKEN }}
QSTASH_DESTINATION_URL=https://mangacdc.34.73.231.106.sslip.io/api/webhook
EOF

      - name: Deploy via gcloud
        env:
          GCP_VM_NAME: ${{ secrets.GCP_VM_NAME }}
          GCP_ZONE: ${{ secrets.GCP_ZONE }}
        run: |
          gcloud compute scp /tmp/manga-cdc-env ${GCP_USER}@${GCP_VM_NAME}:~/${GCP_APP_DIR}/.env \
            --zone=${GCP_ZONE} --quiet

          gcloud compute ssh ${GCP_USER}@${GCP_VM_NAME} \
            --zone=${GCP_ZONE} --quiet --command="
            set -e
            cd /home/${GCP_USER}/${GCP_APP_DIR}
            git fetch origin master
            git reset --hard origin/master
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo 'Deployment complete'
          "
