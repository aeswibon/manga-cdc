name: GitHub release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stage-release-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish release notes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          git fetch --tags origin
          VERSION="$(git tag --points-at HEAD | grep -E '^v[0-9]' | sort -V | tail -1)"
          if [ -z "$VERSION" ]; then
            echo "No release tag at HEAD"
            exit 1
          fi
          chmod +x scripts/generate-release-notes.sh
          ./scripts/generate-release-notes.sh "$VERSION" > release-notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "semver=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.notes.outputs.version }}
          name: ${{ steps.notes.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          make_latest: true

      - name: Export outputs for pipeline-compose
        if: success()
        run: |
          mkdir -p pipeline-compose
          jq -n \
            --arg version "${{ steps.notes.outputs.version }}" \
            --arg semver "${{ steps.notes.outputs.semver }}" \
            '{version: $version, semver: $semver}' \
            > pipeline-compose/outputs.json

      - uses: actions/upload-artifact@v6
        if: success()
        with:
          name: pipeline-compose-github-release
          path: pipeline-compose/outputs.json
          retention-days: 1
