name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service

jobs:
  deploy:
    name: Deploy to DOKS
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save manga-cdc-prod
      - uses: azure/setup-helm@v4
        with:
          version: "latest"
      - run: |
          helm upgrade --install manga-cdc helm/manga-cdc \
            --namespace manga-cdc --create-namespace \
            --set images.scraper=${{ env.SCRAPER_IMAGE }}:${{ steps.tag.outputs.sha_short }} \
            --set images.notification=${{ env.NOTIFICATION_IMAGE }}:${{ steps.tag.outputs.sha_short }} \
            --set discord.webhookUrl=${{ secrets.DISCORD_WEBHOOK_URL }} \
            --wait
        env:
          KUBECONFIG: /home/runner/.kube/config
