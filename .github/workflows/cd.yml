name: CD

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: echo "value=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push scraper
        uses: docker/build-push-action@v6
        with:
          context: scraper
          push: true
          tags: |
            ${{ env.SCRAPER_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.SCRAPER_IMAGE }}:latest

      - name: Build and push notification-service
        uses: docker/build-push-action@v6
        with:
          context: notification-service
          push: true
          tags: |
            ${{ env.NOTIFICATION_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.NOTIFICATION_IMAGE }}:latest

  deploy:
    name: Deploy to DOKS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save manga-cdc-prod
      - uses: azure/setup-helm@v4
        with:
          version: "latest"
      - run: |
          helm upgrade --install manga-cdc helm/manga-cdc \
            --namespace manga-cdc --create-namespace \
            --set images.scraper=${{ env.SCRAPER_IMAGE }}:${{ needs.build-and-push.outputs.tag }} \
            --set images.notification=${{ env.NOTIFICATION_IMAGE }}:${{ needs.build-and-push.outputs.tag }} \
            --set discord.webhookUrl=${{ secrets.DISCORD_WEBHOOK_URL }} \
            --wait
        env:
          KUBECONFIG: /home/runner/.kube/config
