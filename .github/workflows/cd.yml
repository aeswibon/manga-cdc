name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service

jobs:
  deploy:
    name: Deploy to GCP VM
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - id: tag
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: webfactory/ssh-agent@v0.9
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Write .env file
        run: |
          cat > /tmp/manga-cdc-env << EOF
SCRAPER_IMAGE=${{ env.SCRAPER_IMAGE }}:${{ steps.tag.outputs.sha_short }}
NOTIFICATION_IMAGE=${{ env.NOTIFICATION_IMAGE }}:${{ steps.tag.outputs.sha_short }}
DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
KAFKA_BROKERS=${{ secrets.KAFKA_BROKERS }}
KAFKA_USERNAME=${{ secrets.KAFKA_USERNAME }}
KAFKA_PASSWORD=${{ secrets.KAFKA_PASSWORD }}
CDC_ENABLED=true
EOF

      - name: Deploy via Docker Compose
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          scp -o StrictHostKeyChecking=no /tmp/manga-cdc-env $DEPLOY_USER@$DEPLOY_HOST:/home/$DEPLOY_USER/manga-cdc/.env
          ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "
            set -e
            cd /home/$DEPLOY_USER/manga-cdc
            git fetch origin master
            git reset --hard origin/master
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo 'Deployment complete'
          "
