name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service

jobs:
  deploy:
    name: Deploy via Docker Compose
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - id: tag
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: webfactory/ssh-agent@v0.9
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy via Docker Compose
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          IMAGE_TAG: ${{ steps.tag.outputs.sha_short }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "
            set -e
            cd /opt/manga-cdc
            git fetch origin master
            git reset --hard origin/master
            sed -i 's|SCRAPER_IMAGE=.*|SCRAPER_IMAGE=${SCRAPER_IMAGE}:${IMAGE_TAG}|' .env
            sed -i 's|NOTIFICATION_IMAGE=.*|NOTIFICATION_IMAGE=${NOTIFICATION_IMAGE}:${IMAGE_TAG}|' .env
            sed -i 's|DISCORD_WEBHOOK_URL=.*|DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}|' .env
            docker compose pull
            docker compose up -d --remove-orphans
            echo 'Deployment complete'
          "
