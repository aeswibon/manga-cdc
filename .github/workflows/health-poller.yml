name: Pipeline Health Poller

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  poll-health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch pipeline health and sync to Vercel KV
        env:
          PIPELINE_HEALTH_URL: ${{ secrets.PIPELINE_HEALTH_URL }}
          API_READ_KEY: ${{ secrets.API_READ_KEY }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: |
          if [ -z "$PIPELINE_HEALTH_URL" ] || [ -z "$API_READ_KEY" ] || [ -z "$KV_REST_API_URL" ] || [ -z "$KV_REST_API_TOKEN" ]; then
            echo "Missing required secrets. Ensure PIPELINE_HEALTH_URL, API_READ_KEY, KV_REST_API_URL, and KV_REST_API_TOKEN are set."
            exit 1
          fi

          echo "Fetching pipeline health from notifier..."
          HEALTH_JSON=$(curl -sS --fail --max-time 10 \
            -H "X-Api-Key: $API_READ_KEY" \
            "$PIPELINE_HEALTH_URL")

          echo "Saving to Vercel KV..."
          STATUS_CODE=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$KV_REST_API_URL/set/pipeline_health" \
            -H "Authorization: Bearer $KV_REST_API_TOKEN" \
            -d "$HEALTH_JSON")

          if [ "$STATUS_CODE" != "200" ]; then
            echo "Failed to save to Vercel KV (HTTP $STATUS_CODE)"
            exit 1
          fi

          echo "Successfully synced pipeline health."
