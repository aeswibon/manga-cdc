name: Test and Build

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service

jobs:
  repo-policy:
    name: Repository policy checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Block tracked agent docs
        run: ./scripts/check-no-superpowers.sh
      - name: Require signed commits without Cursor co-authors
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./scripts/check-commit-policy.sh "origin/${{ github.event.pull_request.base.ref }}"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            ./scripts/check-commit-policy.sh "${{ github.event.before }}"
          else
            ./scripts/check-commit-policy.sh "HEAD"
          fi

  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: scraper/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -v -count=1

  go-integration-test:
    name: Go integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: mangacdc
          POSTGRES_USER: mangacdc
          POSTGRES_PASSWORD: mangacdc
          PGUSER: mangacdc
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: scraper/go.sum
      - run: go mod download
      - name: Integration tests
        run: go test -tags=integration ./internal/... -v -count=1
        env:
          DATABASE_URL_TEST: postgres://mangacdc:mangacdc@localhost:5432/mangacdc?sslmode=disable

  configure-test:
    name: Configure tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: configure
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: configure/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go test ./... -v -count=1

  java-test:
    name: Java tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - run: mvn verify -B -Pintegration-tests

  e2e-test:
    name: End-to-end tests
    needs: [repo-policy, go-test, go-integration-test, configure-test, java-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: ./scripts/e2e.sh

  build:
    name: Build and push Docker images
    needs: [repo-policy, go-test, go-integration-test, configure-test, java-test, e2e-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (scraper)
        id: meta-scraper
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.SCRAPER_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
            type=sha,prefix=,suffix=,format=short,enable=${{ github.event_name != 'pull_request' }}
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=manga-cdc scraper
            org.opencontainers.image.description=Scrapes manga sources and publishes new chapter events to Kafka

      - name: Docker meta (notification-service)
        id: meta-notification
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.NOTIFICATION_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
            type=sha,prefix=,suffix=,format=short,enable=${{ github.event_name != 'pull_request' }}
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=manga-cdc notification-service
            org.opencontainers.image.description=Consumes chapter CDC events from Kafka and sends Discord, Slack, and Telegram notifications

      - name: Build and push scraper
        uses: docker/build-push-action@v7
        with:
          context: scraper
          push: true
          tags: ${{ steps.meta-scraper.outputs.tags }}
          labels: ${{ steps.meta-scraper.outputs.labels }}
          annotations: ${{ steps.meta-scraper.outputs.annotations }}
          build-args: |
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_VERSION=${{ github.ref_name }}
          provenance: mode=max
          sbom: true

      - name: Build and push notification-service
        uses: docker/build-push-action@v7
        with:
          context: notification-service
          push: true
          tags: ${{ steps.meta-notification.outputs.tags }}
          labels: ${{ steps.meta-notification.outputs.labels }}
          annotations: ${{ steps.meta-notification.outputs.annotations }}
          build-args: |
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_VERSION=${{ github.ref_name }}
          provenance: mode=max
          sbom: true
