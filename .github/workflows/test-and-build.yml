name: Test and Build

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service
  DASHBOARD_IMAGE: ghcr.io/aeswibon/manga-cdc/dashboard
  SNAPSHOT_TAG: ci-${{ github.sha }}
  VITE_STATUS_PAGE_URL: ${{ vars.VITE_STATUS_PAGE_URL || 'http://localhost:3001' }}

# PR/master pushes cancel superseded runs; release dispatches run to completion.
concurrency:
  group: test-build-${{ github.event.pull_request.number || github.ref }}${{ github.event_name == 'workflow_dispatch' && format('-dispatch-{0}', github.run_id) || '' }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  gate:
    name: Pipeline gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
      release: ${{ steps.check.outputs.release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect CI-only vs release build
        id: check
        run: |
          git fetch --tags origin
          if git tag --points-at HEAD | grep -qE '^v[0-9]'; then
            echo "Release commit: version tag points at HEAD."
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "CI-only run (no release tag at HEAD)."
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

  watchlist-validate:
    name: Validate watchlist
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/validate-watchlist.py

  dashboard-test:
    name: Dashboard tests
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard
    env:
      VITE_STATUS_PAGE_URL: ${{ vars.VITE_STATUS_PAGE_URL || 'http://localhost:3001' }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run check
      - run: bun test
      - name: Production build
        run: bun run build
      - name: Verify build output
        run: test -f dist/index.html

  status-page-check:
    name: Status page checks
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: status-page
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck
      - name: Verify static assets
        run: |
          test -f public/index.html
          test -f public/logo.svg
          test -f api/status.ts
          node -e "JSON.parse(require('fs').readFileSync('vercel.json','utf8'))"

  go-test:
    name: Go tests
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: scraper/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      - name: Adapter parser tests
        run: go test ./internal/adapter/... -count=1 -v
      - run: go test ./... -v -count=1

  go-integration-test:
    name: Go integration tests
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: scraper
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: mangacdc
          POSTGRES_USER: mangacdc
          POSTGRES_PASSWORD: mangacdc
          PGUSER: mangacdc
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: scraper/go.sum
      - run: go mod download
      - name: Integration tests
        run: go test -tags=integration -p 1 ./internal/... -v -count=1
        env:
          DATABASE_URL_TEST: postgres://mangacdc:mangacdc@localhost:5432/mangacdc?sslmode=disable

  configure-test:
    name: Configure tests
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: configure
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: configure/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go test ./... -v -count=1

  terraform-fmt:
    name: Terraform fmt
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.6"
      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform/

  terraform-validate-plan:
    name: Terraform (${{ matrix.cloud }} / ${{ matrix.target }})
    needs: [gate, terraform-fmt]
    if: ${{ needs.gate.outputs.proceed == 'true' && needs.terraform-fmt.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        cloud: [gcp, aws, azure, digitalocean]
        target: [vm, kubernetes, serverless]
    env:
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_EC2_METADATA_DISABLED: true
      ARM_USE_CLI: false
      ARM_SKIP_PROVIDER_REGISTRATION: true
      ARM_SUBSCRIPTION_ID: 00000000-0000-0000-0000-000000000000
      ARM_TENANT_ID: 00000000-0000-0000-0000-000000000000
      ARM_CLIENT_ID: 00000000-0000-0000-0000-000000000000
      ARM_CLIENT_SECRET: ci-dummy-secret
      GOOGLE_CLOUD_PROJECT: ci-validate-project
      GOOGLE_OAUTH_ACCESS_TOKEN: ci-dummy-token
      DIGITALOCEAN_TOKEN: ci-dummy-token
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.6"
          terraform_wrapper: false
      - name: Validate and plan
        run: bash ./scripts/ci/terraform-matrix-check.sh "${{ matrix.cloud }}" "${{ matrix.target }}"

  terraform:
    name: Terraform
    needs: [gate, terraform-fmt, terraform-validate-plan]
    if: ${{ needs.gate.outputs.proceed == 'true' && needs.terraform-fmt.result == 'success' && needs.terraform-validate-plan.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Terraform checks passed
        run: echo "fmt and all cloud/target validate+plan checks succeeded"

  java-test:
    name: Java tests
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - run: mvn verify -B -Pintegration-tests

  docker-snapshot:
    name: Build CI snapshot images
    if: needs.gate.outputs.proceed == 'true' && (github.event_name == 'pull_request' || ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.gate.outputs.release == 'true'))
    needs: [gate, terraform, dashboard-test, status-page-check]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    outputs:
      scraper_image: ${{ steps.snapshot-tags.outputs.scraper }}
      notification_image: ${{ steps.snapshot-tags.outputs.notification }}
      dashboard_image: ${{ steps.snapshot-tags.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set snapshot tags
        id: snapshot-tags
        run: |
          echo "scraper=${{ env.SCRAPER_IMAGE }}:${{ env.SNAPSHOT_TAG }}" >> "$GITHUB_OUTPUT"
          echo "notification=${{ env.NOTIFICATION_IMAGE }}:${{ env.SNAPSHOT_TAG }}" >> "$GITHUB_OUTPUT"
          echo "dashboard=${{ env.DASHBOARD_IMAGE }}:${{ env.SNAPSHOT_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Build and push scraper snapshot
        uses: docker/build-push-action@v7
        with:
          context: .
          file: scraper/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.SCRAPER_IMAGE }}:${{ env.SNAPSHOT_TAG }}
          cache-from: type=gha,scope=manga-cdc-scraper
          cache-to: type=gha,mode=max,scope=manga-cdc-scraper

      - name: Build and push notification-service snapshot (JVM, PR/CI)
        if: needs.gate.outputs.release != 'true'
        uses: docker/build-push-action@v7
        with:
          context: notification-service
          file: notification-service/Dockerfile.jvm
          platforms: linux/amd64
          push: true
          tags: ${{ env.NOTIFICATION_IMAGE }}:${{ env.SNAPSHOT_TAG }}
          cache-from: type=gha,scope=manga-cdc-notification-jvm
          cache-to: type=gha,mode=max,scope=manga-cdc-notification-jvm

      - name: Build and push notification-service snapshot (native, release)
        if: needs.gate.outputs.release == 'true'
        uses: docker/build-push-action@v7
        with:
          context: notification-service
          platforms: linux/amd64
          push: true
          tags: ${{ env.NOTIFICATION_IMAGE }}:${{ env.SNAPSHOT_TAG }}
          cache-from: type=gha,scope=manga-cdc-notification-native
          cache-to: type=gha,mode=max,scope=manga-cdc-notification-native

      - name: Build and push dashboard snapshot
        uses: docker/build-push-action@v7
        with:
          context: dashboard
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DASHBOARD_IMAGE }}:${{ env.SNAPSHOT_TAG }}
          build-args: |
            VITE_STATUS_PAGE_URL=${{ env.VITE_STATUS_PAGE_URL }}
          cache-from: type=gha,scope=manga-cdc-dashboard
          cache-to: type=gha,mode=max,scope=manga-cdc-dashboard

  e2e-test:
    name: End-to-end tests
    if: needs.gate.outputs.proceed == 'true' && (github.event_name == 'pull_request' || ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.gate.outputs.release == 'true'))
    needs: [gate, terraform, docker-snapshot, go-test, go-integration-test, configure-test, java-test, dashboard-test, watchlist-validate, status-page-check]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SCRAPER_IMAGE: ${{ needs.docker-snapshot.outputs.scraper_image }}
      NOTIFICATION_IMAGE: ${{ needs.docker-snapshot.outputs.notification_image }}
      DASHBOARD_IMAGE: ${{ needs.docker-snapshot.outputs.dashboard_image }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: ./scripts/e2e.sh

  build:
    name: Build and push Docker images
    if: needs.gate.outputs.proceed == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.gate.outputs.release == 'true'
    needs: [gate, docker-snapshot, e2e-test]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image_tag: ${{ steps.release-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag
        id: release-tag
        run: |
          git fetch --tags origin
          release_tag="$(git tag --points-at HEAD | grep -E '^v[0-9]' | sort -V | tail -1 || true)"
          if [ -z "$release_tag" ]; then
            echo "No release tag at HEAD"
            exit 1
          fi
          semver="${release_tag#v}"
          major="${semver%%.*}"
          rest="${semver#*.}"
          minor="${rest%%.*}"
          echo "tag=$semver" >> "$GITHUB_OUTPUT"
          echo "major_minor=${major}.${minor}" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"

      - name: Docker meta (scraper)
        id: meta-scraper
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.SCRAPER_IMAGE }}
          tags: |
            type=raw,value=${{ steps.release-tag.outputs.tag }}
            type=raw,value=${{ steps.release-tag.outputs.major_minor }}
            type=raw,value=${{ steps.release-tag.outputs.major }}
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Docker meta (notification-service)
        id: meta-notification
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.NOTIFICATION_IMAGE }}
          tags: |
            type=raw,value=${{ steps.release-tag.outputs.tag }}
            type=raw,value=${{ steps.release-tag.outputs.major_minor }}
            type=raw,value=${{ steps.release-tag.outputs.major }}
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Docker meta (dashboard)
        id: meta-dashboard
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DASHBOARD_IMAGE }}
          tags: |
            type=raw,value=${{ steps.release-tag.outputs.tag }}
            type=raw,value=${{ steps.release-tag.outputs.major_minor }}
            type=raw,value=${{ steps.release-tag.outputs.major }}
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Push release tags (scraper)
        run: |
          tags=""
          for tag in $(echo "${{ steps.meta-scraper.outputs.tags }}"); do
            tags="$tags --tag $tag"
          done
          docker buildx imagetools create $tags ${{ env.SCRAPER_IMAGE }}:${{ env.SNAPSHOT_TAG }}

      - name: Push release tags (notification-service)
        run: |
          tags=""
          for tag in $(echo "${{ steps.meta-notification.outputs.tags }}"); do
            tags="$tags --tag $tag"
          done
          docker buildx imagetools create $tags ${{ env.NOTIFICATION_IMAGE }}:${{ env.SNAPSHOT_TAG }}

      - name: Push release tags (dashboard)
        run: |
          tags=""
          for tag in $(echo "${{ steps.meta-dashboard.outputs.tags }}"); do
            tags="$tags --tag $tag"
          done
          docker buildx imagetools create $tags ${{ env.DASHBOARD_IMAGE }}:${{ env.SNAPSHOT_TAG }}

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub (scraper)
        run: |
          docker buildx imagetools create \
            --tag docker.io/${{ secrets.DOCKER_USERNAME }}/scraper:${{ steps.release-tag.outputs.tag }} \
            --tag docker.io/${{ secrets.DOCKER_USERNAME }}/scraper:latest \
            ${{ env.SCRAPER_IMAGE }}:${{ env.SNAPSHOT_TAG }}

      - name: Push to Docker Hub (notification-service)
        run: |
          docker buildx imagetools create \
            --tag docker.io/${{ secrets.DOCKER_USERNAME }}/notification-service:${{ steps.release-tag.outputs.tag }} \
            --tag docker.io/${{ secrets.DOCKER_USERNAME }}/notification-service:latest \
            ${{ env.NOTIFICATION_IMAGE }}:${{ env.SNAPSHOT_TAG }}

      - name: Push to Docker Hub (dashboard)
        run: |
          docker buildx imagetools create \
            --tag docker.io/${{ secrets.DOCKER_USERNAME }}/dashboard:${{ steps.release-tag.outputs.tag }} \
            --tag docker.io/${{ secrets.DOCKER_USERNAME }}/dashboard:latest \
            ${{ env.DASHBOARD_IMAGE }}:${{ env.SNAPSHOT_TAG }}

  release:
    name: Publish release notes
    needs: [gate, build]
    if: needs.gate.outputs.proceed == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.gate.outputs.release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          git fetch --tags origin
          VERSION="$(git tag --points-at HEAD | grep -E '^v[0-9]' | sort -V | tail -1)"
          if [ -z "$VERSION" ]; then
            echo "No release tag at HEAD"
            exit 1
          fi
          chmod +x scripts/generate-release-notes.sh
          ./scripts/generate-release-notes.sh "$VERSION" > release-notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "semver=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.notes.outputs.version }}
          name: ${{ steps.notes.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          make_latest: true
