name: Test and Build

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service
  SNAPSHOT_TAG: ci-${{ github.sha }}

jobs:
  repo-policy:
    name: Repository policy checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Block tracked agent docs
        run: ./scripts/check-no-superpowers.sh
      - name: Require signed commits without Cursor co-authors
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./scripts/check-commit-policy.sh "origin/${{ github.event.pull_request.base.ref }}"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            ./scripts/check-commit-policy.sh "${{ github.event.before }}"
          else
            ./scripts/check-commit-policy.sh "HEAD"
          fi

  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: scraper/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -v -count=1

  go-integration-test:
    name: Go integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: mangacdc
          POSTGRES_USER: mangacdc
          POSTGRES_PASSWORD: mangacdc
          PGUSER: mangacdc
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: scraper/go.sum
      - run: go mod download
      - name: Integration tests
        run: go test -tags=integration ./internal/... -v -count=1
        env:
          DATABASE_URL_TEST: postgres://mangacdc:mangacdc@localhost:5432/mangacdc?sslmode=disable

  configure-test:
    name: Configure tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: configure
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: configure/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go test ./... -v -count=1

  java-test:
    name: Java tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - run: mvn verify -B -Pintegration-tests

  docker-snapshot:
    name: Build CI snapshot images
    needs: [repo-policy, go-test, go-integration-test, configure-test, java-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      scraper_image: ${{ steps.snapshot-tags.outputs.scraper }}
      notification_image: ${{ steps.snapshot-tags.outputs.notification }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set snapshot tags
        id: snapshot-tags
        run: |
          echo "scraper=${{ env.SCRAPER_IMAGE }}:${{ env.SNAPSHOT_TAG }}" >> "$GITHUB_OUTPUT"
          echo "notification=${{ env.NOTIFICATION_IMAGE }}:${{ env.SNAPSHOT_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Build and push scraper snapshot
        uses: docker/build-push-action@v7
        with:
          context: scraper
          push: true
          tags: ${{ env.SCRAPER_IMAGE }}:${{ env.SNAPSHOT_TAG }}
          cache-from: type=gha,scope=manga-cdc-scraper
          cache-to: type=gha,mode=max,scope=manga-cdc-scraper

      - name: Build and push notification-service snapshot
        uses: docker/build-push-action@v7
        with:
          context: notification-service
          push: true
          tags: ${{ env.NOTIFICATION_IMAGE }}:${{ env.SNAPSHOT_TAG }}
          cache-from: type=gha,scope=manga-cdc-notification
          cache-to: type=gha,mode=max,scope=manga-cdc-notification

  e2e-test:
    name: End-to-end tests
    needs: [docker-snapshot]
    runs-on: ubuntu-latest
    env:
      SCRAPER_IMAGE: ${{ needs.docker-snapshot.outputs.scraper_image }}
      NOTIFICATION_IMAGE: ${{ needs.docker-snapshot.outputs.notification_image }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: ./scripts/e2e.sh

  build:
    name: Build and push Docker images
    needs: [docker-snapshot, e2e-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image_tag: ${{ steps.release-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag
        id: release-tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta (scraper)
        id: meta-scraper
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.SCRAPER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
            type=sha,prefix=,suffix=,format=short,enable=${{ github.event_name != 'pull_request' }}
            type=ref,event=pr

      - name: Docker meta (notification-service)
        id: meta-notification
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.NOTIFICATION_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
            type=sha,prefix=,suffix=,format=short,enable=${{ github.event_name != 'pull_request' }}
            type=ref,event=pr

      - name: Build and push scraper
        uses: docker/build-push-action@v7
        with:
          context: scraper
          push: true
          tags: ${{ steps.meta-scraper.outputs.tags }}
          labels: ${{ steps.meta-scraper.outputs.labels }}
          annotations: ${{ steps.meta-scraper.outputs.annotations }}
          cache-from: |
            type=gha,scope=manga-cdc-scraper
            type=registry,ref=${{ env.SCRAPER_IMAGE }}:${{ env.SNAPSHOT_TAG }}
          provenance: mode=max
          sbom: true

      - name: Build and push notification-service
        uses: docker/build-push-action@v7
        with:
          context: notification-service
          push: true
          tags: ${{ steps.meta-notification.outputs.tags }}
          labels: ${{ steps.meta-notification.outputs.labels }}
          annotations: ${{ steps.meta-notification.outputs.annotations }}
          cache-from: |
            type=gha,scope=manga-cdc-notification
            type=registry,ref=${{ env.NOTIFICATION_IMAGE }}:${{ env.SNAPSHOT_TAG }}
          provenance: mode=max
          sbom: true

  release:
    name: Publish release notes
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          chmod +x scripts/generate-release-notes.sh
          ./scripts/generate-release-notes.sh "$VERSION" > release-notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "semver=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.version }}
          name: ${{ steps.notes.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          make_latest: true
          overwrite: true
