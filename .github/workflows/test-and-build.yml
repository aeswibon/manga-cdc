name: Test and Build

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service
  SNAPSHOT_TAG: ci-${{ github.sha }}

# Tag and branch pushes for the same commit use different concurrency groups so a
# master push cannot cancel an in-flight release (tag) pipeline.
concurrency:
  group: test-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Pipeline gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Skip duplicate master push for tagged releases
        id: check
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/master" ]; then
            git fetch --tags origin
            if git tag --points-at HEAD | grep -qE '^v[0-9]'; then
              echo "Commit is tagged for release; the tag push runs the full pipeline."
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

  repo-policy:
    name: Repository policy checks
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Block tracked agent docs
        run: ./scripts/check-no-superpowers.sh
      - name: Require signed commits without Cursor co-authors
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./scripts/check-commit-policy.sh "origin/${{ github.event.pull_request.base.ref }}"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            ./scripts/check-commit-policy.sh "${{ github.event.before }}"
          else
            ./scripts/check-commit-policy.sh "HEAD"
          fi

  go-test:
    name: Go tests
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: scraper/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      - name: Adapter parser tests
        run: go test ./internal/adapter/... -count=1 -v
      - run: go test ./... -v -count=1

  go-integration-test:
    name: Go integration tests
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: scraper
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: mangacdc
          POSTGRES_USER: mangacdc
          POSTGRES_PASSWORD: mangacdc
          PGUSER: mangacdc
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: scraper/go.sum
      - run: go mod download
      - name: Integration tests
        run: go test -tags=integration -p 1 ./internal/... -v -count=1
        env:
          DATABASE_URL_TEST: postgres://mangacdc:mangacdc@localhost:5432/mangacdc?sslmode=disable

  configure-test:
    name: Configure tests
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: configure
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: configure/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go test ./... -v -count=1

  terraform-fmt:
    name: Terraform fmt
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.6"
      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform/

  terraform-validate-plan:
    name: Terraform (${{ matrix.cloud }} / ${{ matrix.target }})
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        cloud: [gcp, aws, azure, digitalocean]
        target: [vm, kubernetes, serverless]
    env:
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_EC2_METADATA_DISABLED: true
      ARM_USE_CLI: false
      ARM_SKIP_PROVIDER_REGISTRATION: true
      ARM_SUBSCRIPTION_ID: 00000000-0000-0000-0000-000000000000
      ARM_TENANT_ID: 00000000-0000-0000-0000-000000000000
      ARM_CLIENT_ID: 00000000-0000-0000-0000-000000000000
      ARM_CLIENT_SECRET: ci-dummy-secret
      GOOGLE_CLOUD_PROJECT: ci-validate-project
      GOOGLE_OAUTH_ACCESS_TOKEN: ci-dummy-token
      DIGITALOCEAN_TOKEN: ci-dummy-token
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.6"
          terraform_wrapper: false
      - name: Validate and plan
        run: bash ./scripts/ci/terraform-matrix-check.sh "${{ matrix.cloud }}" "${{ matrix.target }}"

  terraform:
    name: Terraform
    needs: [gate, terraform-fmt, terraform-validate-plan]
    if: ${{ needs.gate.outputs.proceed == 'true' && needs.terraform-fmt.result == 'success' && needs.terraform-validate-plan.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Terraform checks passed
        run: echo "fmt and all cloud/target validate+plan checks succeeded"

  java-test:
    name: Java tests
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - run: mvn verify -B -Pintegration-tests

  docker-snapshot:
    name: Build CI snapshot images
    if: needs.gate.outputs.proceed == 'true' && (github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch')
    needs: [gate, repo-policy, terraform]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      scraper_image: ${{ steps.snapshot-tags.outputs.scraper }}
      notification_image: ${{ steps.snapshot-tags.outputs.notification }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set snapshot tags
        id: snapshot-tags
        run: |
          echo "scraper=${{ env.SCRAPER_IMAGE }}:${{ env.SNAPSHOT_TAG }}" >> "$GITHUB_OUTPUT"
          echo "notification=${{ env.NOTIFICATION_IMAGE }}:${{ env.SNAPSHOT_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Build and push scraper snapshot
        uses: docker/build-push-action@v7
        with:
          context: .
          file: scraper/Dockerfile
          push: true
          tags: ${{ env.SCRAPER_IMAGE }}:${{ env.SNAPSHOT_TAG }}
          cache-from: type=gha,scope=manga-cdc-scraper
          cache-to: type=gha,mode=max,scope=manga-cdc-scraper

      - name: Build and push notification-service snapshot
        uses: docker/build-push-action@v7
        with:
          context: notification-service
          push: true
          tags: ${{ env.NOTIFICATION_IMAGE }}:${{ env.SNAPSHOT_TAG }}
          cache-from: type=gha,scope=manga-cdc-notification
          cache-to: type=gha,mode=max,scope=manga-cdc-notification

  e2e-test:
    name: End-to-end tests
    if: needs.gate.outputs.proceed == 'true' && (github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch')
    needs: [gate, terraform, docker-snapshot, repo-policy, go-test, go-integration-test, configure-test, java-test]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SCRAPER_IMAGE: ${{ needs.docker-snapshot.outputs.scraper_image }}
      NOTIFICATION_IMAGE: ${{ needs.docker-snapshot.outputs.notification_image }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: ./scripts/e2e.sh

  build:
    name: Build and push Docker images
    if: needs.gate.outputs.proceed == 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [gate, docker-snapshot, e2e-test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image_tag: ${{ steps.release-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag
        id: release-tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta (scraper)
        id: meta-scraper
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.SCRAPER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=,suffix=,format=short,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=pr

      - name: Docker meta (notification-service)
        id: meta-notification
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.NOTIFICATION_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=,suffix=,format=short,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=pr

      - name: Push release tags (scraper)
        run: |
          tags=""
          for tag in $(echo "${{ steps.meta-scraper.outputs.tags }}"); do
            tags="$tags --tag $tag"
          done
          docker buildx imagetools create $tags ${{ env.SCRAPER_IMAGE }}:${{ env.SNAPSHOT_TAG }}

      - name: Push release tags (notification-service)
        run: |
          tags=""
          for tag in $(echo "${{ steps.meta-notification.outputs.tags }}"); do
            tags="$tags --tag $tag"
          done
          docker buildx imagetools create $tags ${{ env.NOTIFICATION_IMAGE }}:${{ env.SNAPSHOT_TAG }}

  release:
    name: Publish release notes
    needs: [gate, build]
    if: needs.gate.outputs.proceed == 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          chmod +x scripts/generate-release-notes.sh
          ./scripts/generate-release-notes.sh "$VERSION" > release-notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "semver=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.version }}
          name: ${{ steps.notes.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          make_latest: true
          overwrite: true
