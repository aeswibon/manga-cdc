name: Deploy

on:
  workflow_run:
    workflows: [Test and Build]
    types: [completed]
  workflow_dispatch:
    inputs:
      cloud_provider:
        description: "Cloud Provider (gcp, aws, azure, digitalocean)"
        required: true
        default: "gcp"
        type: choice
        options:
          - gcp
          - aws
          - azure
          - digitalocean
      deployment_target:
        description: "Deployment Target (vm, kubernetes, serverless)"
        required: true
        default: "serverless"
        type: choice
        options:
          - vm
          - kubernetes
          - serverless
      deploy_method:
        description: "Deployment Method (direct, terraform)"
        required: true
        default: "terraform"
        type: choice
        options:
          - direct
          - terraform
      image_tag:
        description: "Docker Image Tag to deploy"
        required: true
        default: "latest"

concurrency:
  group: deploy-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  SCRAPER_IMAGE: ghcr.io/aeswibon/manga-cdc/scraper
  NOTIFICATION_IMAGE: ghcr.io/aeswibon/manga-cdc/notification-service
  DASHBOARD_IMAGE: ghcr.io/aeswibon/manga-cdc/dashboard

jobs:
  resolve-release:
    name: Resolve release tag
    if: ${{ (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
      actions: read
    outputs:
      should_deploy: ${{ steps.tag.outputs.should_deploy }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
      cloud_provider: ${{ steps.config.outputs.cloud_provider }}
      deployment_target: ${{ steps.config.outputs.deployment_target }}
      deploy_method: ${{ steps.config.outputs.deploy_method }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - uses: docker/login-action@v4
        if: github.event_name == 'workflow_run'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4
        if: github.event_name == 'workflow_run'

      - name: Require version tag and verify pipeline
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SNAPSHOT_TAG: ci-${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_input="${{ github.event.inputs.image_tag }}"
            if [ "$tag_input" = "latest" ]; then
              echo "Manual deploy must use an explicit version tag, not latest."
              exit 1
            fi
            if ! echo "$tag_input" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
              echo "Manual deploy image_tag must be a semver (e.g. 0.4.0), not '$tag_input'."
              exit 1
            fi
            git fetch --tags origin
            if ! git rev-parse "refs/tags/v${tag_input}" >/dev/null 2>&1; then
              echo "Manual deploy requires an existing release tag v${tag_input} on origin."
              exit 1
            fi
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=v${tag_input}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${tag_input}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 1. Tag check
          git fetch --tags origin
          release_tag="$(git tag --points-at HEAD | grep -E '^v[0-9]' | sort -V | tail -1 || true)"
          if [ -z "$release_tag" ]; then
            echo "No release tag on commit; skipping deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. Verify triggering run built docker images
          summary=$(gh api "/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs" \
            --jq '[.jobs[] | select(.name == "docker-snapshot" or .name == "Build and push Docker images") | .conclusion] | join(",")')
          echo "Triggering run: docker-snapshot/build conclusions = [${summary}]"
          if ! echo "$summary" | grep -qE "success"; then
            echo "Triggering run did not build images (gated master push); skipping deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 3. Verify snapshot images exist on ghcr.io
          echo "Checking for ${{ env.SCRAPER_IMAGE }}:${SNAPSHOT_TAG}..."
          for i in $(seq 1 6); do
            if docker buildx imagetools inspect "${{ env.SCRAPER_IMAGE }}:${SNAPSHOT_TAG}" > /dev/null 2>&1 \
              && docker buildx imagetools inspect "${{ env.NOTIFICATION_IMAGE }}:${SNAPSHOT_TAG}" > /dev/null 2>&1 \
              && docker buildx imagetools inspect "${{ env.DASHBOARD_IMAGE }}:${SNAPSHOT_TAG}" > /dev/null 2>&1; then
              echo "Snapshot images exist."
              break
            fi
            echo "Attempt $i: images not ready, waiting 10s..."
            sleep 10
          done
          if [ "$i" -eq 6 ]; then
            echo "Snapshot images not found after retries; skipping deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Release tag: $release_tag"
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "image_tag=${release_tag#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve deploy configuration
        id: config
        env:
          INPUT_CLOUD: ${{ github.event.inputs.cloud_provider }}
          INPUT_TARGET: ${{ github.event.inputs.deployment_target }}
          INPUT_METHOD: ${{ github.event.inputs.deploy_method }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            cloud="$INPUT_CLOUD"
            target="$INPUT_TARGET"
            method="$INPUT_METHOD"
          else
            cloud="gcp"
            target="serverless"
            method="terraform"
          fi
          echo "cloud_provider=$cloud" >> "$GITHUB_OUTPUT"
          echo "deployment_target=$target" >> "$GITHUB_OUTPUT"
          echo "deploy_method=$method" >> "$GITHUB_OUTPUT"

  deploy-gcp:
    name: Deploy (GCP)
    needs: resolve-release
    if: ${{ needs.resolve-release.outputs.should_deploy == 'true' && needs.resolve-release.outputs.cloud_provider == 'gcp' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE_TAG: ${{ needs.resolve-release.outputs.image_tag }}
      DEPLOYMENT_TARGET: ${{ needs.resolve-release.outputs.deployment_target }}
      DEPLOY_METHOD: ${{ needs.resolve-release.outputs.deploy_method }}
      GCP_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Deploy summary
        run: |
          echo "GCP deploy — target=${DEPLOYMENT_TARGET} method=${DEPLOY_METHOD} image=${IMAGE_TAG}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure GKE kubeconfig
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'kubernetes'
        run: gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_NAME }} --zone ${{ secrets.GCP_ZONE || 'us-central1-a' }}

      - name: Parse DATABASE_URL for JDBC
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'kubernetes'
        id: db_parser
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bash ./scripts/ci/parse-database-url.sh

      - name: Deploy to Kubernetes via Helm
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'kubernetes'
        env:
          SCRAPER_IMAGE: ${{ env.SCRAPER_IMAGE }}
          NOTIFICATION_IMAGE: ${{ env.NOTIFICATION_IMAGE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JDBC_URL: ${{ steps.db_parser.outputs.jdbc_url }}
          DB_USER: ${{ steps.db_parser.outputs.db_user }}
          DB_PASS: ${{ steps.db_parser.outputs.db_pass }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          API_READ_KEY: ${{ secrets.API_READ_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: bash ./scripts/ci/helm-deploy.sh

      - name: Deploy to Cloud Run
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'serverless'
        run: |
          gcloud run services update manga-cdc-notifier-prod \
            --image=${{ env.NOTIFICATION_IMAGE }}:${{ env.IMAGE_TAG }} \
            --region=${{ env.GCP_REGION }} \
            --memory=512Mi \
            --cpu=1 \
            --cpu-throttling \
            --concurrency=80 \
            --min-instances=0 \
            --max-instances=2 \
            --update-env-vars=CDC_ENABLED=false,DB_MAX_POOL_SIZE=3,DB_MIN_IDLE=0,SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
          gcloud run jobs update manga-cdc-scraper-job-prod \
            --image=${{ env.SCRAPER_IMAGE }}:${{ env.IMAGE_TAG }} \
            --region=${{ env.GCP_REGION }} \
            --memory=512Mi \
            --cpu=1

      - uses: docker/setup-buildx-action@v4
        if: env.DEPLOY_METHOD == 'terraform'

      - uses: docker/login-action@v4
        if: env.DEPLOY_METHOD == 'terraform'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v4
        if: env.DEPLOY_METHOD == 'terraform'
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push images to Docker Hub
        if: env.DEPLOY_METHOD == 'terraform'
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          GHCR_SCRAPER: ${{ env.SCRAPER_IMAGE }}:${{ env.IMAGE_TAG }}
          GHCR_NOTIFIER: ${{ env.NOTIFICATION_IMAGE }}:${{ env.IMAGE_TAG }}
          DOCKER_SCRAPER_TAG: docker.io/${{ secrets.DOCKER_USERNAME }}/scraper:${{ env.IMAGE_TAG }}
          DOCKER_NOTIFIER_TAG: docker.io/${{ secrets.DOCKER_USERNAME }}/notification-service:${{ env.IMAGE_TAG }}
          DOCKER_SCRAPER_LATEST: docker.io/${{ secrets.DOCKER_USERNAME }}/scraper:latest
          DOCKER_NOTIFIER_LATEST: docker.io/${{ secrets.DOCKER_USERNAME }}/notification-service:latest
        run: |
          docker buildx imagetools create \
            --tag "$DOCKER_SCRAPER_TAG" --tag "$DOCKER_SCRAPER_LATEST" \
            "$GHCR_SCRAPER"
          docker buildx imagetools create \
            --tag "$DOCKER_NOTIFIER_TAG" --tag "$DOCKER_NOTIFIER_LATEST" \
            "$GHCR_NOTIFIER"
          echo "SCRAPER_IMAGE=docker.io/$DOCKER_USER/scraper" >> "$GITHUB_ENV"
          echo "NOTIFICATION_IMAGE=docker.io/$DOCKER_USER/notification-service" >> "$GITHUB_ENV"

      - name: Setup Terraform
        if: env.DEPLOY_METHOD == 'terraform'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.6"

      - name: Terraform apply
        if: env.DEPLOY_METHOD == 'terraform'
        env:
          DEPLOYMENT_TARGET: ${{ env.DEPLOYMENT_TARGET }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ env.GCP_REGION }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRAFANA_CLOUD_PROMETHEUS_URL: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USER: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          GRAFANA_CLOUD_API_KEY: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          GRAFANA_CLOUD_STACK_URL: ${{ secrets.GRAFANA_CLOUD_STACK_URL }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          QSTASH_DESTINATION_URL: ${{ secrets.QSTASH_DESTINATION_URL }}
          API_READ_KEY: ${{ secrets.API_READ_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: bash ./scripts/ci/terraform-apply.sh gcp

  deploy-aws:
    name: Deploy (AWS)
    needs: resolve-release
    if: ${{ needs.resolve-release.outputs.should_deploy == 'true' && needs.resolve-release.outputs.cloud_provider == 'aws' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE_TAG: ${{ needs.resolve-release.outputs.image_tag }}
      DEPLOYMENT_TARGET: ${{ needs.resolve-release.outputs.deployment_target }}
      DEPLOY_METHOD: ${{ needs.resolve-release.outputs.deploy_method }}
      AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Deploy summary
        run: |
          echo "AWS deploy — target=${DEPLOYMENT_TARGET} method=${DEPLOY_METHOD} image=${IMAGE_TAG}"

      - name: Configure AWS Credentials (OIDC)
        if: env.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS Credentials (access keys)
        if: env.AWS_ROLE_ARN == ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render production .env
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'vm'
        env:
          SCRAPER_IMAGE: ${{ env.SCRAPER_IMAGE }}:${{ env.IMAGE_TAG }}
          NOTIFICATION_IMAGE: ${{ env.NOTIFICATION_IMAGE }}:${{ env.IMAGE_TAG }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_TOPIC: mangacdc.public.chapters
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CDC_ENABLED: "true"
          OBSERVABILITY_MODE: grafana-cloud
          GRAFANA_CLOUD_PROMETHEUS_URL: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USER: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          GRAFANA_CLOUD_API_KEY: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          GRAFANA_CLOUD_STACK_URL: ${{ secrets.GRAFANA_CLOUD_STACK_URL }}
          GRAFANA_CLOUD_PROMETHEUS_DATASOURCE_UID: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_DATASOURCE_UID }}
          API_READ_KEY: ${{ secrets.API_READ_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: bash ./scripts/ci/render-direct-env.sh

      - name: Deploy to VM
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'vm'
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: bash ./scripts/ci/vm-direct-deploy.sh

      - name: Configure EKS kubeconfig
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'kubernetes'
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Parse DATABASE_URL for JDBC
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'kubernetes'
        id: db_parser
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bash ./scripts/ci/parse-database-url.sh

      - name: Deploy to Kubernetes via Helm
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'kubernetes'
        env:
          SCRAPER_IMAGE: ${{ env.SCRAPER_IMAGE }}
          NOTIFICATION_IMAGE: ${{ env.NOTIFICATION_IMAGE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JDBC_URL: ${{ steps.db_parser.outputs.jdbc_url }}
          DB_USER: ${{ steps.db_parser.outputs.db_user }}
          DB_PASS: ${{ steps.db_parser.outputs.db_pass }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          API_READ_KEY: ${{ secrets.API_READ_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: bash ./scripts/ci/helm-deploy.sh

      - name: Deploy to ECS Fargate
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'serverless'
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition manga-cdc-notifier)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMAGE "${{ env.NOTIFICATION_IMAGE }}:${{ env.IMAGE_TAG }}" '.taskDefinition | .containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster manga-cdc-ecs-prod --service manga-cdc-notifier --task-definition "$NEW_ARN"

          TASK_DEF_SCRAPER=$(aws ecs describe-task-definition --task-definition manga-cdc-scraper)
          NEW_TASK_DEF_SCRAPER=$(echo "$TASK_DEF_SCRAPER" | jq --arg IMAGE "${{ env.SCRAPER_IMAGE }}:${{ env.IMAGE_TAG }}" '.taskDefinition | .containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF_SCRAPER"

      - name: Setup Terraform
        if: env.DEPLOY_METHOD == 'terraform'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.6"

      - name: Terraform apply
        if: env.DEPLOY_METHOD == 'terraform'
        env:
          DEPLOYMENT_TARGET: ${{ env.DEPLOYMENT_TARGET }}
          SCRAPER_IMAGE: ${{ env.SCRAPER_IMAGE }}
          NOTIFICATION_IMAGE: ${{ env.NOTIFICATION_IMAGE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          AWS_REGION: ${{ env.AWS_REGION }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRAFANA_CLOUD_PROMETHEUS_URL: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USER: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          GRAFANA_CLOUD_API_KEY: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          GRAFANA_CLOUD_STACK_URL: ${{ secrets.GRAFANA_CLOUD_STACK_URL }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          QSTASH_DESTINATION_URL: ${{ secrets.QSTASH_DESTINATION_URL }}
          API_READ_KEY: ${{ secrets.API_READ_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: bash ./scripts/ci/terraform-apply.sh aws

  deploy-azure:
    name: Deploy (Azure)
    needs: resolve-release
    if: ${{ needs.resolve-release.outputs.should_deploy == 'true' && needs.resolve-release.outputs.cloud_provider == 'azure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE_TAG: ${{ needs.resolve-release.outputs.image_tag }}
      DEPLOYMENT_TARGET: ${{ needs.resolve-release.outputs.deployment_target }}
      DEPLOY_METHOD: ${{ needs.resolve-release.outputs.deploy_method }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Deploy summary
        run: |
          echo "Azure deploy — target=${DEPLOYMENT_TARGET} method=${DEPLOY_METHOD} image=${IMAGE_TAG}"

      - name: Log in to Azure (OIDC)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure (service principal JSON)
        if: env.AZURE_CLIENT_ID == ''
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Render production .env
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'vm'
        env:
          SCRAPER_IMAGE: ${{ env.SCRAPER_IMAGE }}:${{ env.IMAGE_TAG }}
          NOTIFICATION_IMAGE: ${{ env.NOTIFICATION_IMAGE }}:${{ env.IMAGE_TAG }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_TOPIC: mangacdc.public.chapters
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CDC_ENABLED: "true"
          OBSERVABILITY_MODE: grafana-cloud
          GRAFANA_CLOUD_PROMETHEUS_URL: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USER: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          GRAFANA_CLOUD_API_KEY: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          GRAFANA_CLOUD_STACK_URL: ${{ secrets.GRAFANA_CLOUD_STACK_URL }}
          GRAFANA_CLOUD_PROMETHEUS_DATASOURCE_UID: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_DATASOURCE_UID }}
          API_READ_KEY: ${{ secrets.API_READ_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: bash ./scripts/ci/render-direct-env.sh

      - name: Deploy to VM
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'vm'
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: bash ./scripts/ci/vm-direct-deploy.sh

      - name: Configure AKS kubeconfig
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'kubernetes'
        run: az aks get-credentials --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Parse DATABASE_URL for JDBC
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'kubernetes'
        id: db_parser
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bash ./scripts/ci/parse-database-url.sh

      - name: Deploy to Kubernetes via Helm
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'kubernetes'
        env:
          SCRAPER_IMAGE: ${{ env.SCRAPER_IMAGE }}
          NOTIFICATION_IMAGE: ${{ env.NOTIFICATION_IMAGE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JDBC_URL: ${{ steps.db_parser.outputs.jdbc_url }}
          DB_USER: ${{ steps.db_parser.outputs.db_user }}
          DB_PASS: ${{ steps.db_parser.outputs.db_pass }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          API_READ_KEY: ${{ secrets.API_READ_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: bash ./scripts/ci/helm-deploy.sh

      - name: Deploy to Container Apps
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'serverless'
        run: |
          az containerapp update -n manga-cdc-notifier-prod -g rg-manga-cdc-prod \
            --image ${{ env.NOTIFICATION_IMAGE }}:${{ env.IMAGE_TAG }}
          az containerapp job update -n manga-cdc-scraper-job-prod -g rg-manga-cdc-prod \
            --image ${{ env.SCRAPER_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Setup Terraform
        if: env.DEPLOY_METHOD == 'terraform'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.6"

      - name: Terraform apply
        if: env.DEPLOY_METHOD == 'terraform'
        env:
          DEPLOYMENT_TARGET: ${{ env.DEPLOYMENT_TARGET }}
          SCRAPER_IMAGE: ${{ env.SCRAPER_IMAGE }}
          NOTIFICATION_IMAGE: ${{ env.NOTIFICATION_IMAGE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRAFANA_CLOUD_PROMETHEUS_URL: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USER: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          GRAFANA_CLOUD_API_KEY: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          GRAFANA_CLOUD_STACK_URL: ${{ secrets.GRAFANA_CLOUD_STACK_URL }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          QSTASH_DESTINATION_URL: ${{ secrets.QSTASH_DESTINATION_URL }}
          API_READ_KEY: ${{ secrets.API_READ_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: bash ./scripts/ci/terraform-apply.sh azure

  deploy-digitalocean:
    name: Deploy (DigitalOcean)
    needs: resolve-release
    if: ${{ needs.resolve-release.outputs.should_deploy == 'true' && needs.resolve-release.outputs.cloud_provider == 'digitalocean' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE_TAG: ${{ needs.resolve-release.outputs.image_tag }}
      DEPLOYMENT_TARGET: ${{ needs.resolve-release.outputs.deployment_target }}
      DEPLOY_METHOD: ${{ needs.resolve-release.outputs.deploy_method }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Deploy summary
        run: |
          echo "DigitalOcean deploy — target=${DEPLOYMENT_TARGET} method=${DEPLOY_METHOD} image=${IMAGE_TAG}"

      - name: Setup doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Render production .env
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'vm'
        env:
          SCRAPER_IMAGE: ${{ env.SCRAPER_IMAGE }}:${{ env.IMAGE_TAG }}
          NOTIFICATION_IMAGE: ${{ env.NOTIFICATION_IMAGE }}:${{ env.IMAGE_TAG }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_TOPIC: mangacdc.public.chapters
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CDC_ENABLED: "true"
          OBSERVABILITY_MODE: grafana-cloud
          GRAFANA_CLOUD_PROMETHEUS_URL: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USER: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          GRAFANA_CLOUD_API_KEY: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          GRAFANA_CLOUD_STACK_URL: ${{ secrets.GRAFANA_CLOUD_STACK_URL }}
          GRAFANA_CLOUD_PROMETHEUS_DATASOURCE_UID: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_DATASOURCE_UID }}
          API_READ_KEY: ${{ secrets.API_READ_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: bash ./scripts/ci/render-direct-env.sh

      - name: Deploy to VM
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'vm'
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: bash ./scripts/ci/vm-direct-deploy.sh

      - name: Configure DOKS kubeconfig
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'kubernetes'
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DOKS_CLUSTER_NAME }}

      - name: Parse DATABASE_URL for JDBC
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'kubernetes'
        id: db_parser
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bash ./scripts/ci/parse-database-url.sh

      - name: Deploy to Kubernetes via Helm
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'kubernetes'
        env:
          SCRAPER_IMAGE: ${{ env.SCRAPER_IMAGE }}
          NOTIFICATION_IMAGE: ${{ env.NOTIFICATION_IMAGE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JDBC_URL: ${{ steps.db_parser.outputs.jdbc_url }}
          DB_USER: ${{ steps.db_parser.outputs.db_user }}
          DB_PASS: ${{ steps.db_parser.outputs.db_pass }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          API_READ_KEY: ${{ secrets.API_READ_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: bash ./scripts/ci/helm-deploy.sh

      - name: Deploy to App Platform
        if: env.DEPLOY_METHOD == 'direct' && env.DEPLOYMENT_TARGET == 'serverless'
        run: doctl apps create-deployment ${{ secrets.DO_APP_ID }}

      - name: Export Spaces credentials for Terraform backend
        if: env.DEPLOY_METHOD == 'terraform'
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.DO_SPACES_ACCESS_KEY }}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.DO_SPACES_SECRET_KEY }}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        if: env.DEPLOY_METHOD == 'terraform'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.6"

      - name: Terraform apply
        if: env.DEPLOY_METHOD == 'terraform'
        env:
          DEPLOYMENT_TARGET: ${{ env.DEPLOYMENT_TARGET }}
          SCRAPER_IMAGE: ${{ env.SCRAPER_IMAGE }}
          NOTIFICATION_IMAGE: ${{ env.NOTIFICATION_IMAGE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          DO_SPACE_ENDPOINT: ${{ secrets.DO_SPACE_ENDPOINT }}
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRAFANA_CLOUD_PROMETHEUS_URL: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USER: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          GRAFANA_CLOUD_API_KEY: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          GRAFANA_CLOUD_STACK_URL: ${{ secrets.GRAFANA_CLOUD_STACK_URL }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          QSTASH_DESTINATION_URL: ${{ secrets.QSTASH_DESTINATION_URL }}
          API_READ_KEY: ${{ secrets.API_READ_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: bash ./scripts/ci/terraform-apply.sh digitalocean

  deploy-status-page:
    name: Deploy status page (Vercel)
    needs: resolve-release
    if: needs.resolve-release.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: bash ./scripts/ci/deploy-status-page.sh

  deploy-dashboard:
    name: Deploy dashboard (Vercel)
    needs: resolve-release
    if: needs.resolve-release.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_DASHBOARD_PROJECT_ID: ${{ secrets.VERCEL_DASHBOARD_PROJECT_ID }}
        run: bash ./scripts/ci/deploy-dashboard-vercel.sh
