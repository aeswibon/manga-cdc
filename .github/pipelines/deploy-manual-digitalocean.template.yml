name: deploy-manual-digitalocean
version: 1
stages:
  - id: deploy-digitalocean
    workflow: .github/workflows/stage-deploy-digitalocean.yml
    inputs:
      image_tag: ${IMAGE_TAG}
      deployment_target: ${DEPLOYMENT_TARGET}
      deploy_method: ${DEPLOY_METHOD}

  - id: deploy-vercel
    workflow: .github/workflows/stage-deploy-vercel.yml
    needs:
      - deploy-digitalocean
