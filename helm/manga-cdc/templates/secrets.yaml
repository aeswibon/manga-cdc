{{- if eq .Values.tier "production" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "manga-cdc.name" . }}-secrets
  labels:
    {{- include "manga-cdc.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.eventing.kafka.enabled }}
  kafka-password: {{ .Values.eventing.kafka.password | quote }}
  kafka-jaas-config: {{ printf "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"%s\" password=\"%s\";" .Values.eventing.kafka.username .Values.eventing.kafka.password | quote }}
  {{- end }}
  {{- if .Values.eventing.qstash.enabled }}
  qstash-token: {{ .Values.eventing.qstash.token | quote }}
  {{- end }}
  {{- if .Values.notifiers.discord }}
  discord-webhook-url: {{ .Values.discord.webhookUrl | quote }}
  {{- end }}
  {{- if .Values.notifiers.slack }}
  slack-webhook-url: {{ .Values.slack.webhookUrl | quote }}
  {{- end }}
  {{- if .Values.notifiers.telegram }}
  telegram-bot-token: {{ .Values.telegram.botToken | quote }}
  telegram-chat-id: {{ .Values.telegram.chatId | quote }}
  {{- end }}
  {{- if .Values.security.apiReadKey }}
  api-read-key: {{ .Values.security.apiReadKey | quote }}
  {{- end }}
  {{- if .Values.security.webhookSecret }}
  webhook-secret: {{ .Values.security.webhookSecret | quote }}
  {{- end }}
  {{- if .Values.security.qstashCurrentSigningKey }}
  qstash-current-signing-key: {{ .Values.security.qstashCurrentSigningKey | quote }}
  {{- end }}
  {{- if .Values.security.qstashNextSigningKey }}
  qstash-next-signing-key: {{ .Values.security.qstashNextSigningKey | quote }}
  {{- end }}
{{- end }}
