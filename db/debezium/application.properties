debezium.sink.type=kafka
debezium.sink.kafka.producer.bootstrap.servers=redpanda:9092
debezium.sink.kafka.producer.key.serializer=org.apache.kafka.common.serialization.StringSerializer
debezium.sink.kafka.producer.value.serializer=org.apache.kafka.common.serialization.StringSerializer

debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.offset.storage.file.filename=data/offsets.dat
debezium.source.offset.flush.interval.ms=0
debezium.source.topic.prefix=mangacdc
debezium.source.database.hostname=postgres
debezium.source.database.port=5432
debezium.source.database.user=mangacdc
debezium.source.database.password=mangacdc
debezium.source.database.dbname=mangacdc
debezium.source.database.server.name=mangacdc
debezium.source.plugin.name=pgoutput
debezium.source.table.include.list=public.chapters

debezium.source.transforms=unwrap,route
debezium.source.transforms.unwrap.type=io.debezium.transforms.ExtractNewRecordState
debezium.source.transforms.unwrap.drop.tombstones=false
debezium.source.transforms.unwrap.delete.handling.mode=rewrite

debezium.source.transforms.route.type=org.apache.kafka.connect.transforms.RegexRouter
debezium.source.transforms.route.regex=mangacdc\\.public\\.(.*)
debezium.source.transforms.route.replacement=mangacdc.public.$1

debezium.source.key.converter=org.apache.kafka.connect.json.JsonConverter
debezium.source.key.converter.schemas.enable=false
debezium.source.value.converter=org.apache.kafka.connect.json.JsonConverter
debezium.source.value.converter.schemas.enable=false

quarkus.log.level=INFO
