services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mangacdc"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      POSTGRES_DB: mangacdc
      POSTGRES_USER: mangacdc
      POSTGRES_PASSWORD: mangacdc

  scraper:
    image: ${SCRAPER_IMAGE:?err}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://mangacdc:mangacdc@postgres:5432/mangacdc?sslmode=disable
      SCRAPE_INTERVAL_SECONDS: "300"
      LOG_LEVEL: info
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      KAFKA_TOPIC: mangacdc.public.chapters
      KAFKA_USERNAME: ${KAFKA_USERNAME}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
    ports:
      - "2112:2112"

  notification-service:
    image: ${NOTIFICATION_IMAGE:?err}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mangacdc
      SPRING_DATASOURCE_USERNAME: mangacdc
      SPRING_DATASOURCE_PASSWORD: mangacdc
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BROKERS}
      SPRING_KAFKA_PROPERTIES_SASL_MECHANISM: SCRAM-SHA-256
      SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG: org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USERNAME}" password="${KAFKA_PASSWORD}";
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: SASL_SSL
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      CDC_ENABLED: "true"

volumes:
  pgdata:
