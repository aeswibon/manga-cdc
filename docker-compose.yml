services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mangacdc
      POSTGRES_USER: mangacdc
      POSTGRES_PASSWORD: mangacdc
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mangacdc"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9644:9644"
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:9092
      - --pandaproxy-addr internal://0.0.0.0:8082
      - --advertise-pandaproxy-addr internal://redpanda:8082
      - --schema-registry-addr internal://0.0.0.0:8081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9644/v1/status/ready | grep -q ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  connect:
    image: debezium/connect:2.7.3.Final
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      connect:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://mangacdc:mangacdc@postgres:5432/mangacdc?sslmode=disable
      SCRAPE_INTERVAL_SECONDS: "300"
      LOG_LEVEL: info
    ports:
      - "2112:2112"

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      connect:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mangacdc
      SPRING_DATASOURCE_USERNAME: mangacdc
      SPRING_DATASOURCE_PASSWORD: mangacdc
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      DISCORD_WEBHOOK_URL: ""
      CDC_ENABLED: "true"
    ports:
      - "8080:8080"

  kafkaui:
    image: provectuslabs/kafka-ui:v0.7.2
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: mangacdc
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: redpanda:9092

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  pgdata:
  grafana-data:
