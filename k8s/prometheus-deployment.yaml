apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: manga-cdc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: manga-cdc-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
