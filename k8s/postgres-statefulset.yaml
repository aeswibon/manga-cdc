apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: manga-cdc
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: mangacdc
            - name: POSTGRES_USER
              value: mangacdc
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: manga-cdc-secrets
                  key: postgres-password
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: migrations
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "mangacdc"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "mangacdc"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: migrations
          configMap:
            name: manga-cdc-initdb
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
