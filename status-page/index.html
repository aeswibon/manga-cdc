<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>manga-cdc · Status</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0f;
        --panel: #12121e;
        --border: #24263b;
        --text: #f3f4f6;
        --muted: #9ca3af;
        --accent: #8b5cf6;
        --ok: #22c55e;
        --warn: #f59e0b;
        --down: #ef4444;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        background:
          radial-gradient(circle at top right, rgba(139, 92, 246, 0.12), transparent 35%),
          var(--bg);
        color: var(--text);
        padding: 2rem 1rem 3rem;
      }

      .wrap {
        max-width: 720px;
        margin: 0 auto;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .logo {
        width: 2rem;
        height: 2rem;
        border-radius: 0.6rem;
        box-shadow: 0 0 18px rgba(139, 92, 246, 0.35);
      }

      h1 {
        margin: 0;
        font-family: Outfit, system-ui, sans-serif;
        font-size: 1.35rem;
        letter-spacing: 0.02em;
      }

      .meta {
        color: var(--muted);
        font-size: 0.8rem;
      }

      .hero {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1.5rem;
        margin-bottom: 1.25rem;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.45rem 0.8rem;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        border: 1px solid transparent;
      }

      .status-pill .dot {
        width: 0.55rem;
        height: 0.55rem;
        border-radius: 50%;
      }

      .status-pill.operational {
        color: #86efac;
        background: rgba(34, 197, 94, 0.12);
        border-color: rgba(34, 197, 94, 0.35);
      }
      .status-pill.operational .dot {
        background: var(--ok);
        box-shadow: 0 0 8px rgba(34, 197, 94, 0.8);
      }

      .status-pill.degraded {
        color: #fcd34d;
        background: rgba(245, 158, 11, 0.12);
        border-color: rgba(245, 158, 11, 0.35);
      }
      .status-pill.degraded .dot { background: var(--warn); }

      .status-pill.down {
        color: #fca5a5;
        background: rgba(239, 68, 68, 0.12);
        border-color: rgba(239, 68, 68, 0.35);
      }
      .status-pill.down .dot {
        background: var(--down);
        box-shadow: 0 0 8px rgba(239, 68, 68, 0.7);
      }

      .status-pill.unknown {
        color: #d1d5db;
        background: rgba(107, 114, 128, 0.12);
        border-color: rgba(107, 114, 128, 0.35);
      }
      .status-pill.unknown .dot { background: #9ca3af; }

      .hero h2 {
        margin: 1rem 0 0.35rem;
        font-family: Outfit, system-ui, sans-serif;
        font-size: 1.5rem;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.5;
      }

      .components {
        display: grid;
        gap: 0.75rem;
      }

      .component {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 0.85rem;
        padding: 0.95rem 1rem;
      }

      .component .name {
        font-weight: 600;
        font-size: 0.92rem;
      }

      .component .detail {
        color: var(--muted);
        font-size: 0.78rem;
        margin-top: 0.2rem;
      }

      .error {
        margin-top: 0.75rem;
        color: #fca5a5;
        font-size: 0.82rem;
      }

      footer {
        margin-top: 2rem;
        color: var(--muted);
        font-size: 0.78rem;
        text-align: center;
      }

      footer a { color: var(--accent); text-decoration: none; }
      footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="brand">
          <img src="/logo.svg" alt="" class="logo" width="32" height="32" />
          <div>
            <h1>manga-cdc</h1>
            <div class="meta">Public pipeline status</div>
          </div>
        </div>
        <div class="meta" id="checked-at">Checking…</div>
      </header>

      <section class="hero">
        <div id="overall-pill" class="status-pill unknown"><span class="dot"></span><span id="overall-label">Checking</span></div>
        <h2 id="headline">Loading status…</h2>
        <p id="summary">This page is hosted on Vercel and polls production independently of the main app.</p>
        <p id="error" class="error" hidden></p>
      </section>

      <section class="components" id="components"></section>

      <footer>
        Hosted separately on Vercel · <a href="https://github.com/aeswibon/manga-cdc" target="_blank" rel="noopener noreferrer">GitHub</a>
      </footer>
    </div>

    <script>
      const overallPill = document.getElementById('overall-pill');
      const overallLabel = document.getElementById('overall-label');
      const headline = document.getElementById('headline');
      const summary = document.getElementById('summary');
      const checkedAt = document.getElementById('checked-at');
      const componentsEl = document.getElementById('components');
      const errorEl = document.getElementById('error');

      function formatRelative(iso) {
        const then = new Date(iso).getTime();
        if (Number.isNaN(then)) return 'unknown';
        const diffSec = Math.round((then - Date.now()) / 1000);
        const rtf = new Intl.RelativeTimeFormat('en', { numeric: 'auto' });
        const abs = Math.abs(diffSec);
        if (abs < 60) return rtf.format(diffSec, 'second');
        const diffMin = Math.round(diffSec / 60);
        if (Math.abs(diffMin) < 60) return rtf.format(diffMin, 'minute');
        const diffHr = Math.round(diffMin / 60);
        return rtf.format(diffHr, 'hour');
      }

      function renderComponent(name, status, detail) {
        const card = document.createElement('div');
        card.className = 'component';
        card.innerHTML = `
          <div>
            <div class="name"></div>
            <div class="detail"></div>
          </div>
        `;
        card.querySelector('.name').textContent = name;
        card.querySelector('.detail').textContent = detail || '';
        const pill = document.createElement('div');
        pill.className = `status-pill ${status}`;
        pill.innerHTML = `<span class="dot"></span><span></span>`;
        pill.querySelector('span:last-child').textContent = status;
        card.appendChild(pill);
        return card;
      }

      async function refresh() {
        try {
          const response = await fetch('/api/status', { cache: 'no-store' });
          const data = await response.json();
          const status = data.status || 'unknown';

          overallPill.className = `status-pill ${status}`;
          overallLabel.textContent = status;
          headline.textContent = data.label || 'Status Unknown';
          checkedAt.textContent = `Checked ${formatRelative(data.checkedAt)} · ${data.latencyMs ?? 0}ms`;

          if (data.error) {
            errorEl.hidden = false;
            errorEl.textContent = data.error;
            summary.textContent = 'Production health endpoint could not be reached from Vercel.';
          } else {
            errorEl.hidden = true;
            summary.textContent = data.sourceUpdatedAt
              ? `Pipeline reported ${formatRelative(data.sourceUpdatedAt)}.`
              : 'Pipeline health endpoint responded successfully.';
          }

          componentsEl.replaceChildren();
          for (const component of data.components || []) {
            componentsEl.appendChild(renderComponent(component.name, component.status, component.detail));
          }
        } catch (error) {
          overallPill.className = 'status-pill down';
          overallLabel.textContent = 'down';
          headline.textContent = 'Status checker failed';
          errorEl.hidden = false;
          errorEl.textContent = error instanceof Error ? error.message : 'Unknown error';
        }
      }

      refresh();
      setInterval(refresh, 60000);
    </script>
  </body>
</html>
