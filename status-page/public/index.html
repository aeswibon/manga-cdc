<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>manga-cdc · Status</title>
    <meta name="description" content="Public pipeline status for manga-cdc." />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="manga-cdc" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0f;
        --panel: #12121e;
        --border: #24263b;
        --text: #f3f4f6;
        --muted: #9ca3af;
        --accent: #8b5cf6;
        --ok: #22c55e;
        --warn: #f59e0b;
        --down: #ef4444;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        background:
          radial-gradient(circle at top right, rgba(139, 92, 246, 0.12), transparent 35%),
          var(--bg);
        color: var(--text);
        padding:
          calc(1rem + env(safe-area-inset-top))
          calc(1rem + env(safe-area-inset-right))
          calc(3rem + env(safe-area-inset-bottom))
          calc(1rem + env(safe-area-inset-left));
        overflow-x: hidden;
      }

      .wrap {
        max-width: 720px;
        margin: 0 auto;
      }

      header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 0.65rem 0.75rem;
        margin-bottom: 1.5rem;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        min-width: 0;
      }

      .brand-copy {
        min-width: 0;
      }

      .logo {
        width: 2rem;
        height: 2rem;
        border-radius: 0.6rem;
        flex-shrink: 0;
        box-shadow: 0 0 18px rgba(139, 92, 246, 0.35);
      }

      h1 {
        margin: 0;
        font-family: Outfit, system-ui, sans-serif;
        font-size: clamp(1.05rem, 4vw, 1.35rem);
        letter-spacing: 0.02em;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .meta {
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.35;
      }

      .header-status {
        justify-self: end;
        max-width: 100%;
      }

      .header-status .status-pill {
        min-height: 2.75rem;
        padding-inline: 0.75rem;
        white-space: nowrap;
      }

      .checked-meta {
        grid-column: 1 / -1;
        text-align: left;
      }

      @media (min-width: 520px) {
        header {
          grid-template-columns: minmax(0, 1fr) auto auto;
        }

        .checked-meta {
          grid-column: 3;
          grid-row: 1;
          text-align: right;
          align-self: center;
          max-width: 12rem;
        }
      }

      .hero {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1.25rem 1.1rem;
        margin-bottom: 1.25rem;
      }

      @media (min-width: 520px) {
        .hero {
          padding: 1.5rem;
        }
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.45rem 0.8rem;
        border-radius: 999px;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        border: 1px solid transparent;
        max-width: 100%;
      }

      .status-pill .dot {
        width: 0.55rem;
        height: 0.55rem;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .status-pill .label {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .status-pill.operational {
        color: #86efac;
        background: rgba(34, 197, 94, 0.12);
        border-color: rgba(34, 197, 94, 0.35);
      }
      .status-pill.operational .dot {
        background: var(--ok);
        box-shadow: 0 0 8px rgba(34, 197, 94, 0.8);
      }

      .status-pill.degraded {
        color: #fcd34d;
        background: rgba(245, 158, 11, 0.12);
        border-color: rgba(245, 158, 11, 0.35);
      }
      .status-pill.degraded .dot { background: var(--warn); }

      .status-pill.down,
      .status-pill.offline {
        color: #fca5a5;
        background: rgba(239, 68, 68, 0.12);
        border-color: rgba(239, 68, 68, 0.35);
      }
      .status-pill.down .dot,
      .status-pill.offline .dot {
        background: var(--down);
        box-shadow: 0 0 8px rgba(239, 68, 68, 0.7);
      }

      .status-pill.unknown,
      .status-pill.checking {
        color: #d1d5db;
        background: rgba(107, 114, 128, 0.12);
        border-color: rgba(107, 114, 128, 0.35);
      }
      .status-pill.unknown .dot,
      .status-pill.checking .dot { background: #9ca3af; }

      .hero h2 {
        margin: 1rem 0 0.35rem;
        font-family: Outfit, system-ui, sans-serif;
        font-size: clamp(1.25rem, 5vw, 1.5rem);
        line-height: 1.2;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.5;
      }

      .hero .status-pill {
        display: none;
      }

      @media (min-width: 520px) {
        .header-status {
          display: none;
        }

        .hero .status-pill {
          display: inline-flex;
        }
      }

      .components {
        display: grid;
        gap: 0.75rem;
      }

      .component {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.75rem;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 0.85rem;
        padding: 0.95rem 1rem;
      }

      .component-head {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        min-width: 0;
      }

      .component-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.35rem;
        height: 1.35rem;
        flex-shrink: 0;
        color: var(--accent);
      }

      .component-icon svg {
        width: 100%;
        height: 100%;
      }

      .component .copy {
        min-width: 0;
        flex: 1 1 auto;
      }

      .component .name {
        font-weight: 600;
        font-size: 0.92rem;
      }

      .component .detail {
        color: var(--muted);
        font-size: 0.78rem;
        margin-top: 0.2rem;
        word-break: break-word;
      }

      .component .status-pill {
        flex-shrink: 0;
        font-size: 0.68rem;
        padding: 0.4rem 0.65rem;
      }

      .error {
        margin-top: 0.75rem;
        color: #fca5a5;
        font-size: 0.82rem;
        word-break: break-word;
      }

      footer {
        margin-top: 2rem;
        color: var(--muted);
        font-size: 0.78rem;
        text-align: center;
        padding-bottom: env(safe-area-inset-bottom);
      }

      footer a { color: var(--accent); text-decoration: none; }
      footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="brand">
          <img src="/logo.svg" alt="" class="logo" width="32" height="32" />
          <div class="brand-copy">
            <h1>manga-cdc</h1>
            <div class="meta">Public pipeline status</div>
          </div>
        </div>
        <div class="header-status" id="header-status" role="status" aria-live="polite">
          <div class="status-pill checking">
            <span class="dot"></span>
            <span class="label" id="header-label">Checking</span>
          </div>
        </div>
        <div class="meta checked-meta" id="checked-at">Checking…</div>
      </header>

      <section class="hero">
        <div id="overall-pill" class="status-pill checking" role="status" aria-live="polite">
          <span class="dot"></span>
          <span class="label" id="overall-label">Checking</span>
        </div>
        <h2 id="headline">Loading status…</h2>
        <p id="summary">This page is hosted on Vercel and polls production independently of the main app.</p>
        <p id="error" class="error" hidden></p>
      </section>

      <section class="components" id="components"></section>

      <footer>
        Hosted separately on Vercel · <a href="https://github.com/aeswibon/manga-cdc" target="_blank" rel="noopener noreferrer">GitHub</a>
      </footer>
    </div>

    <script>
      const overallPill = document.getElementById('overall-pill');
      const overallLabel = document.getElementById('overall-label');
      const headerStatus = document.getElementById('header-status');
      const headerLabel = document.getElementById('header-label');
      const headline = document.getElementById('headline');
      const summary = document.getElementById('summary');
      const checkedAt = document.getElementById('checked-at');
      const componentsEl = document.getElementById('components');
      const errorEl = document.getElementById('error');

      function formatRelative(iso) {
        const then = new Date(iso).getTime();
        if (Number.isNaN(then)) return 'unknown';
        const diffSec = Math.round((then - Date.now()) / 1000);
        const rtf = new Intl.RelativeTimeFormat('en', { numeric: 'auto' });
        const abs = Math.abs(diffSec);
        if (abs < 60) return rtf.format(diffSec, 'second');
        const diffMin = Math.round(diffSec / 60);
        if (Math.abs(diffMin) < 60) return rtf.format(diffMin, 'minute');
        const diffHr = Math.round(diffMin / 60);
        return rtf.format(diffHr, 'hour');
      }

      function statusShortLabel(status) {
        if (status === 'operational') return 'OK';
        if (status === 'degraded') return 'Warn';
        if (status === 'offline' || status === 'down') return 'Down';
        if (status === 'checking') return '…';
        return 'Unknown';
      }

      const COMPONENT_LABELS = {
        notifier: 'Notifier',
        database: 'Database',
        kafka: 'Kafka',
        scraper: 'Scraper',
      };

      const COMPONENT_ICONS = {
        notifier: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>`,
        database: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg>`,
        kafka: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`,
        scraper: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-9-9"/><path d="M21 3v6h-6"/></svg>`,
        default: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>`,
      };

      function formatComponentName(name) {
        const key = (name || '').trim().toLowerCase();
        if (COMPONENT_LABELS[key]) return COMPONENT_LABELS[key];
        return key
          .split(/[-_\s]+/)
          .filter(Boolean)
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(' ');
      }

      function componentIcon(name) {
        const key = (name || '').trim().toLowerCase();
        return COMPONENT_ICONS[key] || COMPONENT_ICONS.default;
      }

      function setOverallStatus(status, label) {
        overallPill.className = `status-pill ${status}`;
        overallLabel.textContent = label;
        headerStatus.firstElementChild.className = `status-pill ${status}`;
        headerLabel.textContent = statusShortLabel(status);
      }

      function renderComponent(name, status, detail) {
        const card = document.createElement('div');
        card.className = 'component';
        card.innerHTML = `
          <div class="copy">
            <div class="component-head">
              <span class="component-icon"></span>
              <div class="name"></div>
            </div>
            <div class="detail"></div>
          </div>
        `;
        card.querySelector('.component-icon').innerHTML = componentIcon(name);
        card.querySelector('.name').textContent = formatComponentName(name);
        card.querySelector('.detail').textContent = detail || '';
        const pill = document.createElement('div');
        pill.className = `status-pill ${status}`;
        pill.innerHTML = `<span class="dot"></span><span class="label"></span>`;
        pill.querySelector('.label').textContent = statusShortLabel(status);
        card.appendChild(pill);
        return card;
      }

      function showOffline(message, detail) {
        setOverallStatus('offline', 'offline');
        headline.textContent = 'Pipeline Offline';
        summary.textContent = 'This page stays available when production APIs are unreachable.';
        checkedAt.textContent = 'Last check failed';
        errorEl.hidden = false;
        errorEl.textContent = detail || message;
        componentsEl.replaceChildren();
      }

      async function refresh() {
        setOverallStatus('checking', 'Checking');
        try {
          const response = await fetch('/api/status', { cache: 'no-store' });
          let data;
          try {
            data = await response.json();
          } catch {
            showOffline('Status checker returned invalid JSON', `HTTP ${response.status}`);
            return;
          }

          if (!response.ok) {
            showOffline(data.label || 'Pipeline Offline', data.error || `HTTP ${response.status}`);
            return;
          }

          const status = data.status || 'unknown';
          const displayStatus = status === 'down' || status === 'unknown' ? 'offline' : status;

          if (data.error || status === 'down' || status === 'unknown') {
            setOverallStatus('offline', 'offline');
            headline.textContent = data.label || 'Pipeline Offline';
            checkedAt.textContent = data.checkedAt
              ? `Checked ${formatRelative(data.checkedAt)} · ${data.latencyMs ?? 0}ms`
              : 'Last check failed';
            errorEl.hidden = false;
            errorEl.textContent = data.error || 'Production health endpoint is not responding.';
            summary.textContent = 'This page stays available when production APIs are unreachable.';
            componentsEl.replaceChildren();
            for (const component of data.components || []) {
              componentsEl.appendChild(renderComponent(component.name, component.status, component.detail));
            }
            return;
          }

          setOverallStatus(displayStatus, displayStatus);
          headline.textContent = data.label || 'Status Unknown';
          checkedAt.textContent = `Checked ${formatRelative(data.checkedAt)} · ${data.latencyMs ?? 0}ms`;
          errorEl.hidden = true;
          summary.textContent = data.sourceUpdatedAt
            ? `Pipeline reported ${formatRelative(data.sourceUpdatedAt)}.`
            : 'Pipeline health endpoint responded successfully.';

          componentsEl.replaceChildren();
          for (const component of data.components || []) {
            componentsEl.appendChild(renderComponent(component.name, component.status, component.detail));
          }
        } catch (error) {
          showOffline('Unable to reach status checker', error instanceof Error ? error.message : 'Unknown error');
        }
      }

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }

      refresh();
      setInterval(refresh, 60000);
    </script>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
